<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>きみまろ道場 v20.5 - 司法書士合格要塞</title>
    <!-- Tailwind CSS & Lucide Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes timer-bar { from { transform: scaleX(1); } to { transform: scaleX(0); } }
        .animate-timer-bar { animation: timer-bar linear forwards; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f8faf8]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- COMPONENTS (Custom UI) ---
        const Badge = ({ children, className = "" }) => (
            <span class={`inline-flex items-center px-2 py-0.5 rounded text-xs font-medium ${className}`}>{children}</span>
        );

        const Card = ({ children, className = "" }) => (
            <div class={`bg-white rounded-[2rem] shadow-sm border border-emerald-50 overflow-hidden ${className}`}>{children}</div>
        );

        // --- CONFIG ---
        const apiKey = ""; // APIキーは空（環境提供を想定）
        const MASTERY_THRESHOLD = 7;
        const REPEAT_GUARD_COUNT = 15;
        const AUTO_NEXT_DELAY = 10000; 
        const HANDS_FREE_WAIT = 4000;

        const FALLBACK_DATA = [
            { "id": 1, "field": "システム", "tag": "ロード失敗", "q": "questions.jsonが見つからないちゃむ！同じフォルダにファイルを置いているか確認してくだちゃい。", "a": "○", "choices": ["○", "×"], "fb_ok": "OKちゃむ！", "fb_ng": "NGちゃむ！" }
        ];

        // --- MAIN APP ---
        function App() {
            const [DATA, setDATA] = useState(null);
            const [appState, setAppState] = useState('setup'); // 'setup' | 'dojo'
            const [viewMode, setViewMode] = useState('dojo'); // 'dojo' | 'ear' | 'stats'
            const [targetCount, setTargetCount] = useState(200);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [results, setResults] = useState(() => JSON.parse(localStorage.getItem('kimimaro-dojo-mastery') || '{}'));
            const [sessionCount, setSessionCount] = useState(0);
            const [history, setHistory] = useState([]);
            const [shuffledChoices, setShuffledChoices] = useState([]);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [aiContent, setAiContent] = useState({ type: '', text: '' });
            const [loadingState, setLoadingState] = useState("");
            const [isPaused, setIsPaused] = useState(false);
            const autoTimerRef = useRef(null);
            const audioRef = useRef(null);

            // 1. Load Data
            useEffect(() => {
                fetch('questions.json')
                    .then(res => res.json())
                    .then(data => {
                        const safeData = data.map(q => ({ ...q, choices: q.choices || ["○", "×"] }));
                        setDATA(safeData);
                    })
                    .catch(() => setDATA(FALLBACK_DATA));
            }, []);

            const currentQ = useMemo(() => DATA ? (DATA[currentIndex] || DATA[0]) : null, [DATA, currentIndex]);

            const handleShuffleChoices = useCallback((idx) => {
                if (!DATA) return;
                const q = DATA[idx] || DATA[0];
                setShuffledChoices([...(q.choices || ["○", "×"])].sort(() => Math.random() - 0.5));
            }, [DATA]);

            const pickNext = useCallback(() => {
                if (autoTimerRef.current) clearTimeout(autoTimerRef.current);
                if (audioRef.current) audioRef.current.pause();
                if (!DATA) return;

                const available = DATA.filter(q => !history.includes(q.id));
                const pool = available.length > 0 ? available : DATA;
                const nextQ = pool[Math.floor(Math.random() * pool.length)];
                const nextIdx = DATA.findIndex(q => q.id === nextQ.id);
                
                setCurrentIndex(nextIdx);
                handleShuffleChoices(nextIdx);
                setShowFeedback(false);
                setIsCorrect(null);
                setAiContent({ type: '', text: '' });
                setHistory(prev => [nextQ.id, ...prev].slice(0, REPEAT_GUARD_COUNT));
            }, [history, handleShuffleChoices, DATA]);

            const handleAnswer = (choice) => {
                if (showFeedback || !currentQ) return;
                const correct = choice === currentQ.a;
                setIsCorrect(correct);
                setShowFeedback(true);
                setSessionCount(prev => prev + 1);

                const r = results[currentQ.id] || { correct_count: 0 };
                const newResults = {
                    ...results,
                    [currentQ.id]: { correct_count: r.correct_count + (correct ? 1 : 0) }
                };
                setResults(newResults);
                localStorage.setItem('kimimaro-dojo-mastery', JSON.stringify(newResults));
                
                if (viewMode === 'dojo' && !isPaused) {
                    autoTimerRef.current = setTimeout(pickNext, AUTO_NEXT_DELAY);
                }
            };

            const handleAiCall = async (type) => {
                setIsPaused(true);
                setLoadingState("ai");
                setAiContent({ type, text: '' });
                const prompts = {
                    else: "Javaエンジニアの視点でelse（例外・ひっかけ）をデバッグして。",
                    detail: "背景法理を初心者向けに詳しく解説してちゃむ。",
                    statute: "関連条文を抜き出して。全文表示してちゃむ。",
                    practical: "この法律知識が実務でどう機能するかシミュレーションしてちゃむ。"
                };
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `問題: ${currentQ.q}\n解答: ${currentQ.a}` }] }],
                            systemInstruction: { parts: [{ text: prompts[type] }] }
                        })
                    });
                    const data = await response.json();
                    setAiContent({ type, text: data.candidates?.[0]?.content?.parts?.[0]?.text || "解析失敗だちゃむ。" });
                } catch (e) { 
                    setAiContent({ type: 'error', text: "通信エラーだちゃむ。APIキーを確認してくだちゃい。" }); 
                } finally { setLoadingState(""); }
            };

            if (!DATA) return (
                <div class="h-screen flex flex-col items-center justify-center bg-slate-900 text-emerald-400">
                    <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-xs font-black tracking-widest uppercase">Initializing Dojo...</p>
                </div>
            );

            if (appState === 'setup') return (
                <div class="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-white overflow-hidden">
                    <div class="max-w-md w-full space-y-12 text-center">
                        <div class="space-y-4">
                            <div class="bg-emerald-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto rotate-3 shadow-lg">
                                <i data-lucide="target" class="w-8 h-8 text-white"></i>
                            </div>
                            <h1 class="text-3xl font-black tracking-tight">きみまろ道場</h1>
                            <Badge className="bg-white/10 text-emerald-400 uppercase tracking-widest text-[10px] border-none">v20.5 Main Station</Badge>
                            <p class="text-xs text-slate-400 font-bold">装填完了：{DATA.length}問</p>
                        </div>
                        <div class="grid grid-cols-2 gap-3 px-4">
                            {[20, 50, 100, 200].map(n => (
                                <button key={n} onClick={() => { setTargetCount(n); setSessionCount(0); setAppState('dojo'); handleShuffleChoices(currentIndex); }}
                                    class="h-16 rounded-xl bg-white/5 hover:bg-emerald-600 border border-white/10 text-lg font-black transition-all active:scale-95">
                                    {n}問 撃破
                                </button>
                            ))}
                        </div>
                        <button onClick={() => { setViewMode('ear'); setAppState('dojo'); setTargetCount(999); pickNext(); }}
                            class="w-full h-16 rounded-2xl bg-orange-100 hover:bg-orange-200 text-orange-700 text-lg font-bold flex items-center justify-center gap-3 transition-all active:scale-95 border-none">
                            <i data-lucide="headphones" class="w-6 h-6"></i> 耳勉（自動）を開始
                        </button>
                    </div>
                </div>
            );

            return (
                <div class="h-screen bg-[#f8faf8] flex flex-col overflow-hidden select-none text-slate-800">
                    <nav class="bg-white border-b border-emerald-100 flex justify-around items-center shrink-0 h-14 z-50 shadow-sm px-2">
                        <button onClick={() => setViewMode('dojo')} class={`flex-1 flex flex-col items-center justify-center h-full transition-all border-b-4 ${viewMode === 'dojo' ? 'border-emerald-500 text-emerald-600 bg-emerald-50/50' : 'border-transparent text-slate-300'}`}>
                            <i data-lucide="book-open" class="w-5 h-5 mb-0.5"></i>
                            <span class="text-[8px] font-black tracking-tighter">道場</span>
                        </button>
                        <button onClick={() => setAppState('setup')} class="flex-1 flex flex-col items-center justify-center h-full transition-all border-transparent text-slate-300">
                            <i data-lucide="refresh-ccw" class="w-5 h-5 mb-0.5"></i>
                            <span class="text-[8px] font-black tracking-tighter">再選</span>
                        </button>
                    </nav>

                    <main class="flex-1 flex flex-col min-h-0 px-4 pt-4 overflow-hidden">
                        <div class="max-w-md mx-auto w-full flex flex-col h-full gap-4">
                            <Card className="bg-[#f2fcf5] shrink-0 border relative">
                                <div class="bg-emerald-400/20 h-1 transition-all duration-700" style={{ width: `${(sessionCount/targetCount)*100}%` }} />
                                <div class="p-6 space-y-4">
                                    <div class="flex justify-between items-center">
                                        <Badge className="bg-white text-emerald-600 border border-emerald-200 px-2 tracking-tight">
                                            {currentQ.field} • {sessionCount}/{targetCount}
                                        </Badge>
                                        <div class="flex gap-1.5">
                                            {[...Array(MASTERY_THRESHOLD)].map((_, i) => (
                                                <div key={i} class={`w-2.5 h-2.5 rounded-full ${i < (results[currentQ.id]?.correct_count || 0) ? 'bg-emerald-400' : 'bg-slate-200'}`} />
                                            ))}
                                        </div>
                                    </div>
                                    <div class="min-h-[110px] flex items-center justify-center px-4 py-2">
                                        <p class="text-base leading-loose text-[#4a3c32] text-center font-medium">
                                            {currentQ.q}
                                        </p>
                                    </div>
                                </div>
                            </Card>

                            {!showFeedback ? (
                                currentQ.choices.length === 2 && currentQ.choices.includes("○") ? (
                                    <div class="flex justify-center gap-12 py-3 shrink-0">
                                        {shuffledChoices.map(c => (
                                            <button key={c} onClick={() => handleAnswer(c)} class="w-24 h-24 text-6xl flex items-center justify-center rounded-full shadow-sm border bg-white active:scale-95 transition-all hover:bg-emerald-50">
                                                {c === "○" ? "🌸" : "💩"}
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div class="flex flex-col gap-2 py-1 shrink-0 px-4">
                                        {shuffledChoices.map(c => (
                                            <button key={c} onClick={() => handleAnswer(c)} class="w-full min-h-[3.5rem] px-4 py-2 text-[15px] font-bold flex items-center justify-center rounded-xl shadow-sm border bg-white active:scale-95 transition-all text-[#4a3c32]">
                                                {c}
                                            </button>
                                        ))}
                                    </div>
                                )
                            ) : (
                                <div class="flex-1 flex flex-col min-h-0 gap-3 overflow-hidden">
                                    <div class={`p-4 rounded-[2rem] border flex flex-col gap-4 shadow-sm shrink-0 ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-orange-50 border-orange-100'}`}>
                                        <div class="flex items-center gap-4 px-2">
                                            <div class={`w-8 h-8 rounded-full flex items-center justify-center text-white font-black text-sm ${isCorrect ? 'bg-emerald-500' : 'bg-orange-400'}`}>
                                                {isCorrect ? '○' : '×'}
                                            </div>
                                            <p class={`text-[13px] font-bold leading-relaxed flex-1 ${isCorrect ? 'text-emerald-800' : 'text-orange-900'}`}>
                                                {isCorrect ? currentQ.fb_ok : currentQ.fb_ng}
                                            </p>
                                        </div>
                                        <div class="flex items-center gap-3">
                                            <button onClick={pickNext} class="flex-1 h-12 bg-emerald-600 hover:bg-emerald-700 text-white text-[11px] font-black rounded-2xl relative overflow-hidden active:scale-95">
                                                次へ進む <i data-lucide="arrow-right" class="inline w-4 h-4 ml-1"></i>
                                                {!isPaused && <div class="absolute bottom-0 left-0 h-1 bg-white/30 animate-timer-bar origin-left w-full" style={{ animationDuration: `${AUTO_NEXT_DELAY}ms` }} />}
                                            </button>
                                            <button onClick={() => setIsPaused(!isPaused)} class={`h-12 w-28 rounded-2xl border transition-all text-[10px] font-black ${isPaused ? 'bg-orange-100 text-orange-600 border-orange-200' : 'bg-white text-slate-400 border-slate-200'}`}>
                                                {isPaused ? '再開' : '停止'}
                                            </button>
                                        </div>
                                        <div class="grid grid-cols-4 gap-2">
                                            {[
                                                { id: 'else', label: 'Else解析', color: 'bg-violet-100 text-violet-700' },
                                                { id: 'detail', label: '詳細解説', color: 'bg-blue-100 text-blue-700' },
                                                { id: 'statute', label: '条文確認', color: 'bg-slate-100 text-slate-700' },
                                                { id: 'practical', label: '実務ハック', color: 'bg-emerald-100 text-emerald-700' }
                                            ].map(b => (
                                                <button key={b.id} onClick={() => handleAiCall(b.id)} class={`${b.color} text-[9px] font-black h-9 rounded-xl active:translate-y-0.5 transition-all`}>
                                                    {b.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div class="flex-1 min-h-0 bg-slate-900 rounded-t-[2.5rem] flex flex-col">
                                        <div class="p-4 border-b border-white/5 flex items-center justify-between">
                                            <span class="text-[10px] font-black text-white/30 tracking-widest uppercase">Analysis Log</span>
                                            {loadingState === "ai" && <Badge className="bg-violet-600 text-white animate-pulse">Analyzing...</Badge>}
                                        </div>
                                        <div class="flex-1 overflow-y-auto p-6 scrollbar-hide text-slate-200 text-sm leading-relaxed whitespace-pre-wrap">
                                            {aiContent.text || <div class="h-full flex items-center justify-center opacity-10 flex-col"><i data-lucide="brain-circuit" class="w-12 h-12 mb-2"></i><p class="text-[10px] tracking-widest uppercase">Waiting for command</p></div>}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Lucide icons initialization
        window.addEventListener('load', () => lucide.createIcons());
        document.addEventListener('click', () => lucide.createIcons());
    </script>
</body>
</html>
