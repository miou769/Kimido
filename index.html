<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>きみまろ道場 v30.0</title>
    <!-- 外部ライブラリ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes timer-bar { from { transform: scaleX(1); } to { transform: scaleX(0); } }
        .animate-timer-bar { animation: timer-bar linear forwards; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-dark { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="bg-[#f8faf8]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // ============================================================
        // 🛠️ 【APIキー設定エリア】
        // 司令官、もしGoogleからキーを貰ったら、下の "" の中に入れてくだちゃい。
        // キーがなくても、基本の問題演習はバッチリ動くちゃむ！
        // ============================================================
        const apiKey = ""; 
        // ============================================================

        const AUTO_NEXT_DELAY = 12000;
        const HANDS_FREE_WAIT = 4000;

        // 🧪 データ救出エンジン (不完全なJSONを1問ずつ拾い出すちゃむ)
        const rescueData = (text) => {
            let s = text.trim();
            s = s.replace(/[“”„〝〞]/g, '"').replace(/[，]/g, ',').replace(/[：]/g, ':');
            s = s.replace(/[\u0000-\u001F\u007F-\u009F]/g, "");
            const results = [];
            const regex = /\{[\s\S]*?"q"\s*:\s*"[\s\S]*?"a"\s*:\s*"[\s\S]*?fb_ok"[\s\S]*?\}/g; 
            let match;
            while ((match = regex.exec(s)) !== null) {
                try {
                    let part = match[0].trim();
                    if (!part.endsWith('}')) part += '}';
                    const obj = JSON.parse(part.replace(/,\s*\}/g, '}'));
                    if (obj.q && obj.a) results.push(obj);
                } catch (e) {}
            }
            return results;
        };

        function App() {
            const [DATA, setDATA] = useState(null);
            const [bootLog, setBootLog] = useState("システム起動中...");
            const [errorMsg, setErrorMsg] = useState(null);
            const [appState, setAppState] = useState('setup');
            const [viewMode, setViewMode] = useState('dojo'); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [results, setResults] = useState(() => JSON.parse(localStorage.getItem('kimimaro-v30-mastery') || '{}'));
            const [sessionCount, setSessionCount] = useState(0);
            const [targetCount, setTargetCount] = useState(100);
            const [shuffledChoices, setShuffledChoices] = useState([]);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [aiContent, setAiContent] = useState("");
            const [loadingState, setLoadingState] = useState("");
            const [isPaused, setIsPaused] = useState(false);
            const autoTimerRef = useRef(null);

            useEffect(() => {
                const init = async () => {
                    try {
                        setBootLog("司令部の questions.json を読み込んでいます...");
                        const response = await fetch(`./questions.json?v=${Date.now()}`);
                        if (!response.ok) throw new Error("questions.json が見つからないちゃむ！");
                        const raw = await response.text();
                        setBootLog("破損データを修復して1問ずつ救出中...");
                        const savedData = rescueData(raw);
                        if (savedData.length === 0) throw new Error("有効な問題が1問も見つからなかったちゃむ。");
                        setDATA(savedData.map((q, i) => ({ ...q, id: q.id || i+1, choices: q.choices || ["○", "×"] })));
                    } catch (e) { setErrorMsg(e.message); }
                };
                init();
            }, []);

            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            const currentQ = useMemo(() => DATA ? (DATA[currentIndex] || DATA[0]) : null, [DATA, currentIndex]);

            const speak = (text, onEnd) => {
                window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(text);
                uttr.lang = 'ja-JP';
                if (onEnd) uttr.onend = onEnd;
                window.speechSynthesis.speak(uttr);
            };

            const handleAnswer = (choice) => {
                if (showFeedback) return;
                const correct = choice === currentQ.a;
                setIsCorrect(correct);
                setShowFeedback(true);
                setSessionCount(s => s + 1);
                const r = results[currentQ.id] || { count: 0 };
                const newRes = { ...results, [currentQ.id]: { count: (r.count || 0) + (correct ? 1 : 0) } };
                setResults(newRes);
                localStorage.setItem('kimimaro-v30-mastery', JSON.stringify(newRes));
                speak(correct ? "正解ちゃむ！" : "残念ちゃむ。");
                if (!isPaused && viewMode === 'dojo') autoTimerRef.current = setTimeout(pickNext, AUTO_NEXT_DELAY);
            };

            const pickNext = useCallback(() => {
                if (autoTimerRef.current) clearTimeout(autoTimerRef.current);
                const idx = Math.floor(Math.random() * DATA.length);
                setCurrentIndex(idx);
                setShuffledChoices([...(DATA[idx].choices || ["○", "×"])].sort(() => Math.random() - 0.5));
                setShowFeedback(false);
                setIsCorrect(null);
                setAiContent("");

                if (viewMode === 'ear') {
                    speak(`問題です。${DATA[idx].q}`, () => {
                        setTimeout(() => {
                            speak(`正解は、${DATA[idx].a}。解説、${DATA[idx].fb_ok}`, () => {
                                setTimeout(pickNext, 3000);
                            });
                        }, HANDS_FREE_WAIT);
                    });
                }
            }, [DATA, viewMode]);

            const handleAiCall = async (type) => {
                if (!apiKey) { setAiContent("【重要】AIボタンを使うには、Google AI Studioで無料発行したAPIキーを、このコードの20行目付近に入れてくだちゃい！"); return; }
                setLoadingState(type);
                setIsPaused(true);
                const prompts = {
                    else: "Javaエンジニアの視点でelse（例外・ひっかけ）をデバッグして。",
                    detail: "背景法理を初心者向けに詳しく解説してちゃむ。",
                    statute: "関連条文を抜き出して。全文表示してちゃむ。",
                    practical: "この法律知識が、実際の司法書士実務でどのように機能するかシミュレーションしてちゃむ。"
                };
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `問題: ${currentQ.q}\n解答: ${currentQ.a}\n指示: ${prompts[type]}` }] }] })
                    });
                    const d = await res.json();
                    setAiContent(d.candidates[0].content.parts[0].text);
                } catch (e) { setAiContent("AI通信失敗だちゃむ。キーを確認してくだちゃい。"); }
                finally { setLoadingState(""); }
            };

            if (!DATA && !errorMsg) return (
                <div className="h-screen bg-slate-900 flex flex-col items-center justify-center text-emerald-400 p-10 text-center">
                    <div className="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <h2 className="text-xl font-black mb-2 tracking-tighter italic">きみまろ道場 起動中...</h2>
                    <p className="text-[10px] font-mono text-slate-500 uppercase tracking-widest">{bootLog}</p>
                </div>
            );

            if (errorMsg) return (
                <div className="h-screen bg-slate-900 flex flex-col items-center justify-center p-8 text-white text-center">
                    <div className="bg-red-500 w-16 h-16 rounded-full flex items-center justify-center mb-6"><i data-lucide="alert-octagon" className="w-8 h-8 text-white"></i></div>
                    <h2 className="text-xl font-black mb-4 italic text-red-400">MISSION ABORTED</h2>
                    <div className="bg-red-900/30 border border-red-500/50 p-6 rounded-[2rem] text-left mb-8 w-full max-w-md">
                        <p className="text-[10px] text-red-400 font-black uppercase mb-1">Diagnosis Log</p>
                        <p className="text-sm text-red-100 font-mono">{errorMsg}</p>
                    </div>
                    <button onClick={()=>window.location.reload()} className="px-10 py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">REBOOT SYSTEM</button>
                </div>
            );

            if (appState === 'setup') return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-white text-center">
                    <div className="max-w-md w-full space-y-12 animate-in fade-in duration-700">
                        <div className="space-y-4">
                            <div className="bg-emerald-500 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl rotate-3"><i data-lucide="shield-check" className="w-10 h-10 text-white"></i></div>
                            <h1 className="text-4xl font-black tracking-tighter italic">きみまろ道場</h1>
                            <div className="inline-block px-4 py-1 bg-emerald-900/40 rounded-full text-[10px] font-black text-emerald-400 border border-emerald-500/20 uppercase tracking-[0.2em]">v30.0 Ultimate Final</div>
                            <div className="p-4 bg-white/5 border border-white/10 rounded-2xl">
                                <p className="text-2xl font-black text-white">{DATA.length}問 救出成功だちゃむ！</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4 px-4">
                            {[20, 50, 100, 200].map(n => (
                                <button key={n} onClick={() => { setTargetCount(n); setSessionCount(0); setAppState('dojo'); setViewMode('dojo'); pickNext(); }}
                                    className="h-16 rounded-2xl bg-white/5 border border-white/10 text-xl font-black hover:bg-emerald-600 transition-all active:scale-95 shadow-lg">
                                    {n}問
                                </button>
                            ))}
                        </div>
                        <button onClick={() => { setViewMode('ear'); setAppState('dojo'); setTargetCount(999); pickNext(); }}
                            className="w-full h-16 rounded-2xl bg-orange-100 hover:bg-orange-200 text-orange-700 text-lg font-bold flex items-center justify-center gap-3 active:scale-95 border-none shadow-xl">
                            <i data-lucide="headphones" className="w-7 h-7"></i> 耳勉を開始
                        </button>
                    </div>
                </div>
            );

            return (
                <div className="h-screen bg-[#f8faf8] flex flex-col overflow-hidden text-slate-800">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-emerald-100 flex items-center justify-between px-6 h-16 shrink-0 z-50">
                        <button onClick={()=>setAppState('setup')} className="text-slate-300 hover:text-emerald-500 transition-transform"><i data-lucide="home" className="w-6 h-6"></i></button>
                        <div className="flex flex-col items-center">
                            <span className="text-[10px] font-black text-emerald-600 tracking-widest uppercase italic tracking-tighter">Kimimaro Dojo Active</span>
                            <span className="text-[9px] font-bold text-slate-400">{sessionCount} / {targetCount}</span>
                        </div>
                        <button onClick={()=>window.location.reload()} className="text-slate-200"><i data-lucide="refresh-cw" className="w-5 h-5"></i></button>
                    </nav>

                    <main className="flex-1 flex flex-col p-4 overflow-hidden max-w-md mx-auto w-full gap-4">
                        {viewMode === 'dojo' ? (
                            <>
                                <div className="bg-white rounded-[2.5rem] border border-emerald-50 shadow-sm p-8 space-y-4 shrink-0 relative overflow-hidden">
                                    <div className="bg-emerald-400 h-1 absolute top-0 left-0 transition-all duration-1000 origin-left" style={{ width: `${(sessionCount/targetCount)*100}%` }} />
                                    <div className="flex justify-between items-center">
                                        <span className="px-3 py-1 bg-emerald-50 text-emerald-700 rounded-full text-[10px] font-black uppercase tracking-widest">{currentQ.field || "民法"}</span>
                                        <div className="flex gap-1.5">
                                            {[...Array(7)].map((_, i) => (
                                                <div key={i} className={`w-2.5 h-2.5 rounded-full ${i < (results[currentQ.id]?.count || 0) ? 'bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.8)]' : 'bg-slate-100'}`} />
                                            ))}
                                        </div>
                                    </div>
                                    <p className="text-[19px] leading-relaxed text-[#1e293b] text-center font-bold min-h-[120px] flex items-center justify-center px-2">{currentQ.q}</p>
                                </div>

                                {!showFeedback ? (
                                    <div className={currentQ.choices.length === 2 && currentQ.choices.includes("○") ? "flex justify-center gap-10 py-6" : "flex flex-col gap-3 py-2 scrollbar-hide overflow-y-auto max-h-[40vh]"}>
                                        {shuffledChoices.map(c => (
                                            <button key={c} onClick={() => handleAnswer(c)} className={currentQ.choices.length === 2 && currentQ.choices.includes("○") ? "w-28 h-28 text-7xl rounded-full bg-white border-2 border-emerald-50 shadow-lg active:scale-75 transition-all transform hover:-translate-y-2 flex items-center justify-center" : "w-full min-h-[4rem] px-6 py-4 text-left font-black bg-white border-2 border-emerald-50 rounded-[1.5rem] active:scale-95 transition-all text-slate-700 shadow-sm flex items-center gap-4"}>
                                                {currentQ.choices.length !== 2 && <div className="w-2.5 h-2.5 rounded-full bg-emerald-400" />}
                                                {c === "○" ? "🌸" : c === "×" ? "💩" : c}
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="flex-1 flex flex-col min-h-0 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500 overflow-hidden">
                                        <div className={`p-6 rounded-[2.5rem] border-2 shadow-md shrink-0 ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-orange-50 border-orange-100'}`}>
                                            <div className="flex items-center gap-5 mb-4">
                                                <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white text-2xl font-black shadow-inner ${isCorrect ? 'bg-emerald-500' : 'bg-orange-400'}`}>{isCorrect ? '○' : '×'}</div>
                                                <p className="text-[14px] font-black flex-1 italic leading-relaxed">{isCorrect ? currentQ.fb_ok : currentQ.fb_ng}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={pickNext} className="flex-1 h-14 bg-emerald-600 text-white font-black rounded-2xl relative overflow-hidden active:scale-95 shadow-lg group">
                                                    次へ進む <i data-lucide="chevron-right" className="inline w-5 h-5 ml-1 transition-transform group-hover:translate-x-1"></i>
                                                    {!isPaused && <div className="absolute bottom-0 left-0 h-1.5 bg-white/30 animate-timer-bar origin-left w-full" style={{ animationDuration: `${AUTO_NEXT_DELAY}ms` }} />}
                                                </button>
                                                <button onClick={()=>setIsPaused(!isPaused)} className={`w-14 h-14 rounded-2xl border flex items-center justify-center ${isPaused ? 'bg-orange-100 text-orange-600' : 'bg-white text-slate-300'}`}>
                                                    <i data-lucide={isPaused ? "play" : "pause"} className="w-6 h-6 fill-current"></i>
                                                </button>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2 mt-4">
                                                {['else', 'detail', 'statute', 'practical'].map(type => (
                                                    <button key={type} onClick={()=>handleAiCall(type)} 
                                                        className={`py-3 rounded-xl text-[9px] font-black uppercase tracking-tighter active:scale-95 border-none shadow-sm ${loadingState === type ? 'bg-emerald-500 text-white animate-pulse' : 'bg-white text-slate-400'}`}>
                                                        {type === 'else' ? 'Else' : type === 'detail' ? 'Logic' : type === 'statute' ? 'Law' : 'Hack'}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <div className="flex-1 glass-dark rounded-t-[3rem] p-8 overflow-y-auto scrollbar-hide text-slate-300 text-[14px] leading-loose shadow-2xl border-t border-white/10">
                                            <div className="flex items-center justify-between mb-6 border-b border-white/5 pb-4">
                                                <div className="flex items-center gap-3">
                                                    <i data-lucide="brain-circuit" className="w-5 h-5 text-emerald-400"></i>
                                                    <span className="text-[10px] font-black text-white/20 tracking-[0.5em] uppercase">Tactical Logic Analyzer</span>
                                                </div>
                                                <span className="text-[8px] bg-emerald-900/50 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20 font-black">STABLE v30</span>
                                            </div>
                                            
                                              {aiContent ? (
                                                <div className="animate-in fade-in duration-700 pb-12">
                                                    <p className="text-[14px] leading-loose whitespace-pre-wrap font-sans text-slate-200">{aiContent}</p>
                                                </div>
                                            ) : (
                                                <div className="h-full flex flex-col items-center justify-center opacity-10">
                                                    <i data-lucide="brain-circuit" className="w-14 h-14 text-white mb-4"></i>
                                                    <p className="text-[11px] text-white tracking-widest text-center uppercase font-black px-10">Select an analysis thread to deploy logic logs</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center space-y-8 text-center">
                                <div className="bg-orange-200 w-32 h-32 rounded-full flex items-center justify-center shadow-2xl animate-pulse">
                                    <i data-lucide="headphones" className="w-14 h-14 text-orange-600"></i>
                                </div>
                                <div className="space-y-2">
                                    <p className="text-base font-black text-slate-700">耳勉モード作動中ちゃむ</p>
                                    <p className="text-xs text-slate-500 px-8">{currentQ?.q || "問題を準備中ちゃむ..."}</p>
                                </div>
                                <button onClick={()=>{window.speechSynthesis.cancel(); setAppState('setup');}} className="px-8 py-3 bg-white border border-orange-200 text-orange-600 rounded-2xl font-black text-sm shadow-lg active:scale-95">停止して戻る</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
