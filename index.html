<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>きみまろ道場 v24.0 - 司令官専用・完全復旧要塞</title>
    <!-- Tailwind & Lucide & React -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes timer-bar { from { transform: scaleX(1); } to { transform: scaleX(0); } }
        .animate-timer-bar { animation: timer-bar linear forwards; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-dark { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#f8faf8]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- CONFIG ---
        const apiKey = ""; // 司令官のAPIキーがあればここに
        const MASTERY_THRESHOLD = 7;
        const AUTO_NEXT_DELAY = 10000;

        // --- 🛠️ 究極の「不屈のパース」エンジン (v24.0強化型) ---
        const rescueData = (text) => {
            let s = text.trim();
            // 基本クリーニング
            s = s.replace(/[“”„〝〞]/g, '"').replace(/[，]/g, ',').replace(/[：]/g, ':');
            s = s.replace(/[\u0000-\u001F\u007F-\u009F]/g, "");

            const results = [];
            // 正規表現で、不完全な末尾でも { ... } の塊だけを抜き出す
            const regex = /\{[\s\S]*?fb_(?:ok|ng)"\s*:\s*"[\s\S]*?"\s*\}/g; 
            let match;
            
            while ((match = regex.exec(s)) !== null) {
                try {
                    // 各オブジェクトを個別にパース
                    const obj = JSON.parse(match[0]);
                    if (obj.q && obj.a) results.push(obj);
                } catch (err) {
                    // 文末カンマなどの微細なエラーを修復して再試行
                    try {
                        const fixed = match[0].replace(/,\s*\}/, '}');
                        const obj = JSON.parse(fixed);
                        if (obj.q && obj.a) results.push(obj);
                    } catch (e2) {}
                }
            }
            return results;
        };

        function App() {
            const [DATA, setDATA] = useState(null);
            const [appState, setAppState] = useState('setup');
            const [viewMode, setViewMode] = useState('dojo'); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [results, setResults] = useState(() => JSON.parse(localStorage.getItem('kimimaro-v24-mastery') || '{}'));
            const [sessionCount, setSessionCount] = useState(0);
            const [targetCount, setTargetCount] = useState(100);
            const [shuffledChoices, setShuffledChoices] = useState([]);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [loadingState, setLoadingState] = useState("");
            const [isPaused, setIsPaused] = useState(false);
            const autoTimerRef = useRef(null);

            // データロード
            useEffect(() => {
                fetch(`./questions.json?v=${Date.now()}`)
                    .then(res => res.text())
                    .then(text => {
                        const data = rescueData(text);
                        if (data.length === 0) throw new Error("データ救出に失敗しました");
                        setDATA(data.map((q, i) => ({ ...q, id: q.id || i+1, choices: q.choices || ["○", "×"] })));
                    })
                    .catch(err => {
                        setDATA([{ id: 0, field: "SYS", q: `致命的エラー: ${err.message}`, a: "○", choices: ["○", "×"], fb_ok: "リロードしてくだちゃい" }]);
                    });
            }, []);

            // アイコンの初期化
            useEffect(() => { lucide.createIcons(); }, [appState, showFeedback, viewMode, DATA]);

            const currentQ = useMemo(() => DATA ? (DATA[currentIndex] || DATA[0]) : null, [DATA, currentIndex]);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(text);
                uttr.lang = 'ja-JP';
                window.speechSynthesis.speak(uttr);
            };

            const handleAnswer = (choice) => {
                if (showFeedback) return;
                const correct = choice === currentQ.a;
                setIsCorrect(correct);
                setShowFeedback(true);
                setSessionCount(s => s + 1);
                
                const r = results[currentQ.id] || { count: 0 };
                const newRes = { ...results, [currentQ.id]: { count: (r.count || 0) + (correct ? 1 : 0) } };
                setResults(newRes);
                localStorage.setItem('kimimaro-v24-mastery', JSON.stringify(newRes));

                speak(correct ? "正解ちゃむ！" : "残念ちゃむ。");
                if (!isPaused) autoTimerRef.current = setTimeout(pickNext, AUTO_NEXT_DELAY);
            };

            const pickNext = () => {
                if (autoTimerRef.current) clearTimeout(autoTimerRef.current);
                const nextIdx = Math.floor(Math.random() * DATA.length);
                setCurrentIndex(nextIdx);
                setShuffledChoices([...(DATA[nextIdx].choices || ["○", "×"])].sort(() => Math.random() - 0.5));
                setShowFeedback(false);
                setIsCorrect(null);
            };

            if (!DATA) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-emerald-400">
                    <div className="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-xs font-black tracking-widest uppercase animate-pulse">Restoring Advanced UI...</p>
                </div>
            );

            if (appState === 'setup') return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-white text-center">
                    <div className="max-w-md w-full space-y-12">
                        <div className="space-y-4">
                            <div className="bg-emerald-500 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl rotate-3"><i data-lucide="shield" className="w-10 h-10 text-white"></i></div>
                            <h1 className="text-4xl font-black tracking-tighter italic">きみまろ道場</h1>
                            <div className="inline-block px-4 py-1 bg-emerald-900/40 rounded-full text-[10px] font-black text-emerald-400 border border-emerald-500/20 uppercase tracking-[0.2em]">v24.0 Full Restoration</div>
                            <p className="text-sm font-bold text-slate-400 pt-4">🛰️ 破損データを修復し、{DATA.length}問を救出成功！</p>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            {[20, 50, 100, 200].map(n => (
                                <button key={n} onClick={() => { setTargetCount(n); setAppState('dojo'); pickNext(); }}
                                    className="h-16 rounded-2xl bg-white/5 border border-white/10 text-xl font-black hover:bg-emerald-600 transition-all active:scale-95 shadow-lg">
                                    {n}問 撃破
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="h-screen bg-[#f8faf8] flex flex-col overflow-hidden text-slate-800">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-emerald-100 flex items-center justify-between px-6 h-14 shrink-0 z-50">
                        <button onClick={()=>setAppState('setup')} className="text-slate-300 hover:text-emerald-500"><i data-lucide="home" className="w-6 h-6"></i></button>
                        <div className="flex flex-col items-center">
                            <span className="text-[10px] font-black text-emerald-600 tracking-widest uppercase">Operational Mode</span>
                            <span className="text-[9px] font-bold text-slate-400 uppercase">{sessionCount} / {targetCount}</span>
                        </div>
                        <button onClick={()=>window.location.reload()} className="text-slate-200"><i data-lucide="refresh-cw" className="w-5 h-5"></i></button>
                    </nav>

                    <main className="flex-1 flex flex-col p-4 overflow-hidden max-w-md mx-auto w-full gap-4">
                        <div className="bg-white rounded-[2.5rem] border border-emerald-50 shadow-sm p-8 space-y-4 shrink-0 relative overflow-hidden">
                            <div className="bg-emerald-400 h-1 absolute top-0 left-0 transition-all duration-1000" style={{ width: `${(sessionCount/targetCount)*100}%` }} />
                            <div className="flex justify-between items-center">
                                <span className="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full text-[10px] font-black uppercase tracking-widest">{currentQ.field}</span>
                                <div className="flex gap-1">
                                    {[...Array(7)].map((_, i) => (
                                        <div key={i} className={`w-2.5 h-2.5 rounded-full ${i < (results[currentQ.id]?.count || 0) ? 'bg-emerald-400 shadow-md' : 'bg-slate-100'}`} />
                                    ))}
                                </div>
                            </div>
                            <p className="text-[19px] leading-relaxed text-[#1e293b] text-center font-bold min-h-[120px] flex items-center justify-center">
                                {currentQ.q}
                            </p>
                        </div>

                        {!showFeedback ? (
                            <div className={currentQ.choices.length === 2 && currentQ.choices.includes("○") ? "flex justify-center gap-10 py-4" : "flex flex-col gap-3 py-2 scrollbar-hide overflow-y-auto max-h-[40vh]"}>
                                {shuffledChoices.map(c => (
                                    <button key={c} onClick={() => handleAnswer(c)} 
                                        className={currentQ.choices.length === 2 && currentQ.choices.includes("○") 
                                            ? "w-24 h-24 text-6xl rounded-full bg-white border-2 border-emerald-50 shadow-lg active:scale-75 transition-all flex items-center justify-center"
                                            : "w-full min-h-[4rem] px-6 py-4 text-left font-black bg-white border-2 border-emerald-50 rounded-2xl active:scale-95 transition-all text-slate-700 flex items-center gap-4 shadow-sm"
                                        }>
                                        {currentQ.choices.length !== 2 && <div className="w-2.5 h-2.5 rounded-full bg-emerald-400" />}
                                        {c === "○" ? "🌸" : c === "×" ? "💩" : c}
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col min-h-0 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500 overflow-hidden">
                                <div className={`p-6 rounded-[2.5rem] border-2 shadow-md shrink-0 ${isCorrect ? 'bg-emerald-50 border-emerald-100' : 'bg-orange-50 border-orange-100'}`}>
                                    <div className="flex items-center gap-5 mb-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white text-2xl font-black shadow-inner ${isCorrect ? 'bg-emerald-500' : 'bg-orange-400'}`}>
                                            {isCorrect ? '○' : '×'}
                                        </div>
                                        <p className="text-[14px] font-black leading-relaxed flex-1 italic">
                                            {isCorrect ? currentQ.fb_ok : currentQ.fb_ng}
                                        </p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={pickNext} className="flex-1 h-14 bg-emerald-600 text-white font-black rounded-2xl relative overflow-hidden active:scale-95 shadow-lg group">
                                            NEXT TARGET <i data-lucide="chevron-right" className="inline w-5 h-5 ml-1 transition-transform group-hover:translate-x-1"></i>
                                            {!isPaused && <div className="absolute bottom-0 left-0 h-1.5 bg-white/30 animate-timer-bar origin-left w-full" style={{ animationDuration: `${AUTO_NEXT_DELAY}ms` }} />}
                                        </button>
                                        <button onClick={()=>setIsPaused(!isPaused)} className={`w-14 h-14 rounded-2xl border flex items-center justify-center ${isPaused ? 'bg-orange-100 text-orange-600' : 'bg-white text-slate-300'}`}>
                                            <i data-lucide={isPaused ? "play" : "pause"} className="w-6 h-6 fill-current"></i>
                                        </button>
                                    </div>
                                </div>

                                {/* 🌙 AI解析ログ（黒い画面）の完全復活 */}
                                <div className="flex-1 glass-dark rounded-t-[3rem] p-8 overflow-y-auto scrollbar-hide text-slate-300 text-[15px] leading-loose shadow-2xl border-t border-white/10">
                                    <div className="flex items-center justify-between mb-6 border-b border-white/5 pb-4">
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="brain-circuit" className="w-5 h-5 text-emerald-400"></i>
                                            <span className="text-[10px] font-black text-white/20 tracking-[0.5em] uppercase">Tactical Logic Log</span>
                                        </div>
                                        <span className="text-[9px] bg-emerald-900/50 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20 font-black">STABLE</span>
                                    </div>
                                    
                                    {currentQ.statute && (
                                        <div className="text-emerald-400 font-black mb-4 flex items-start gap-2 italic">
                                            <i data-lucide="book" className="w-4 h-4 mt-1 shrink-0"></i>
                                            <span>{currentQ.statute}</span>
                                        </div>
                                    )}
                                    
                                    {currentQ.else_trap && (
                                        <div className="bg-white/5 p-6 rounded-[1.5rem] border border-white/5 text-slate-400 italic mb-6">
                                            {currentQ.else_trap}
                                        </div>
                                    )}

                                    {currentQ.practical && (
                                        <div className="mb-8">
                                            <p className="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-2 flex items-center gap-2">
                                                <i data-lucide="briefcase" className="w-3 h-3"></i> Practical Application
                                            </p>
                                            <p className="text-orange-50 font-bold border-l-2 border-orange-500/40 pl-4">
                                                {currentQ.practical}
                                            </p>
                                        </div>
                                    )}

                                    {(!currentQ.statute && !currentQ.else_trap && !currentQ.practical) && (
                                        <div className="h-full flex flex-col items-center justify-center opacity-10 py-10">
                                            <i data-lucide="ghost" className="w-12 h-12 mb-3"></i>
                                            <p className="text-[11px] font-black uppercase tracking-[0.2em]">Detailed Analytics Missing</p>
                                        </div>
                                    )}
                                    <div className="h-20" />
                                </div>
                            </div>
                        )}
                    </main>

                    <style dangerouslySetInnerHTML={{ __html: `
                        .animate-timer-bar { animation: timer-bar linear forwards; }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
