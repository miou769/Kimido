<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>きみまろ道場 v26.0 - 真の不落要塞</title>
    <!-- 外部ライブラリ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; -webkit-tap-highlight-color: transparent; }
        @keyframes timer-bar { from { transform: scaleX(1); } to { transform: scaleX(0); } }
        .animate-timer-bar { animation: timer-bar linear forwards; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-dark { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(15px); }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-[#f8faf8]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef } = React;

        // --- CONFIG ---
        const apiKey = ""; // APIキーがあればセット
        const AUTO_NEXT_DELAY = 12000;

        // --- 🧪 救命ポッド・エンジン (v26.0) ---
        const rescueAndBuild = (text, logFn) => {
            logFn("Cleaning data...");
            let s = text.trim();
            s = s.replace(/[“”„〝〞]/g, '"').replace(/[，]/g, ',').replace(/[：]/g, ':');
            s = s.replace(/[\u0000-\u001F\u007F-\u009F]/g, "");

            logFn("Scanning objects...");
            const results = [];
            // { ... } の中身を正規表現で強引にぶっこ抜くちゃむ
            const regex = /\{[\s\S]*?"q"\s*:\s*"[\s\S]*?"a"\s*:\s*"[\s\S]*?fb_ok"[\s\S]*?\}/g; 
            let match;
            while ((match = regex.exec(s)) !== null) {
                try {
                    // 各オブジェクトを個別に修復・パース
                    let part = match[0].trim();
                    if (!part.endsWith('}')) part += '}';
                    const obj = JSON.parse(part.replace(/,\s*\}/g, '}'));
                    if (obj.q && obj.a) results.push(obj);
                } catch (e) {}
            }
            return results;
        };

        function App() {
            const [DATA, setDATA] = useState(null);
            const [status, setStatus] = useState("Initializing Engine...");
            const [errorMsg, setErrorMsg] = useState(null);
            const [appState, setAppState] = useState('setup');
            const [currentIndex, setCurrentIndex] = useState(0);
            const [results, setResults] = useState(() => JSON.parse(localStorage.getItem('kimimaro-v26-mastery') || '{}'));
            const [sessionCount, setSessionCount] = useState(0);
            const [targetCount, setTargetCount] = useState(100);
            const [shuffledChoices, setShuffledChoices] = useState([]);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(null);
            const [aiContent, setAiContent] = useState("");
            const [loadingState, setLoadingState] = useState("");
            const [isPaused, setIsPaused] = useState(false);
            const autoTimerRef = useRef(null);

            // データ読み込み
            useEffect(() => {
                const init = async () => {
                    try {
                        setStatus("Accessing questions.json...");
                        const response = await fetch(`./questions.json?v=${Date.now()}`);
                        if (!response.ok) throw new Error("File not found on server.");
                        
                        const raw = await response.text();
                        setStatus(`Rescuing data from ${Math.floor(raw.length/1024)}KB file...`);
                        
                        const savedData = rescueAndBuild(raw, (msg) => setStatus(msg));
                        
                        if (savedData.length === 0) throw new Error("No valid question objects recovered.");
                        
                        setDATA(savedData.map((q, i) => ({ ...q, id: q.id || i+1, choices: q.choices || ["○", "×"] })));
                        setStatus("Ready");
                    } catch (e) {
                        setErrorMsg(e.message);
                    }
                };
                init();
            }, []);

            // UI更新ごとにLucideアイコンを再適用
            useEffect(() => { if (window.lucide) lucide.createIcons(); });

            const currentQ = useMemo(() => DATA ? (DATA[currentIndex] || DATA[0]) : null, [DATA, currentIndex]);

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(text);
                uttr.lang = 'ja-JP';
                window.speechSynthesis.speak(uttr);
            };

            const handleAnswer = (choice) => {
                if (showFeedback) return;
                const correct = choice === currentQ.a;
                setIsCorrect(correct);
                setShowFeedback(true);
                setSessionCount(s => s + 1);
                
                const r = results[currentQ.id] || { count: 0 };
                const newRes = { ...results, [currentQ.id]: { count: (r.count || 0) + (correct ? 1 : 0) } };
                setResults(newRes);
                localStorage.setItem('kimimaro-v26-mastery', JSON.stringify(newRes));

                speak(correct ? "正解ちゃむ！" : "残念ちゃむ。");
                if (!isPaused) autoTimerRef.current = setTimeout(pickNext, AUTO_NEXT_DELAY);
            };

            const pickNext = () => {
                if (autoTimerRef.current) clearTimeout(autoTimerRef.current);
                const idx = Math.floor(Math.random() * DATA.length);
                setCurrentIndex(idx);
                setShuffledChoices([...(DATA[idx].choices || ["○", "×"])].sort(() => Math.random() - 0.5));
                setShowFeedback(false);
                setIsCorrect(null);
                setAiContent("");
            };

            const handleAiCall = async (type) => {
                if (!apiKey) { setAiContent("APIキーがありません。GitHubのコードを編集して入れてくだちゃい！"); return; }
                setLoadingState(type);
                setIsPaused(true);
                const prompts = {
                    else: "Javaエンジニアの視点でelse（例外・ひっかけ）をデバッグして。",
                    detail: "背景法理を初心者向けに詳しく解説してちゃむ。",
                    statute: "関連条文を抜き出して全文表示してちゃむ。",
                    practical: "この法律知識が実際の司法書士実務でどう機能するかシミュレーションしてちゃむ。"
                };
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: `問題: ${currentQ.q}\n解答: ${currentQ.a}\n指示: ${prompts[type]}` }] }] })
                    });
                    const d = await res.json();
                    setAiContent(d.candidates[0].content.parts[0].text);
                } catch (e) { setAiContent("通信エラーだちゃむ。"); }
                finally { setLoadingState(""); }
            };

            // ロード画面（真っ白回避用）
            if (!DATA) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white p-8 text-center">
                    <div className="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <h2 className="text-xl font-black mb-2 text-emerald-400">Loading Arsenal...</h2>
                    <p className="text-xs font-mono text-slate-500 tracking-widest uppercase mb-8">{status}</p>
                    {errorMsg && (
                        <div className="p-4 bg-red-900/30 border border-red-500/50 rounded-2xl text-left">
                            <p className="text-red-400 text-[10px] font-black uppercase mb-1">Critical Error</p>
                            <p className="text-xs text-red-200">{errorMsg}</p>
                            <button onClick={()=>window.location.reload()} className="mt-4 w-full py-3 bg-red-600 rounded-xl font-black text-xs uppercase">Re-Deploy</button>
                        </div>
                    )}
                </div>
            );

            if (appState === 'setup') return (
                <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-white text-center">
                    <div className="max-w-md w-full space-y-12">
                        <div className="space-y-4">
                            <div className="bg-emerald-500 w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto shadow-2xl rotate-3"><i data-lucide="shield" className="w-10 h-10 text-white"></i></div>
                            <h1 className="text-4xl font-black tracking-tighter italic">きみまろ道場</h1>
                            <div className="inline-block px-4 py-1 bg-emerald-900/40 rounded-full text-[10px] font-black text-emerald-400 border border-emerald-500/20 uppercase tracking-[0.2em]">v26.0 Tactical Spec</div>
                            <div className="p-4 bg-white/5 border border-white/10 rounded-2xl">
                                <p className="text-xs font-bold text-emerald-400 tracking-widest uppercase">System Stabilized</p>
                                <p className="text-2xl font-black text-white">{DATA.length} Units Loaded</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            {[20, 50, 100, 200].map(n => (
                                <button key={n} onClick={() => { setTargetCount(n); setAppState('dojo'); pickNext(); }}
                                    className="h-20 rounded-3xl bg-white/5 border border-white/10 text-xl font-black hover:bg-emerald-600 transition-all btn-active shadow-lg">
                                    {n}問 撃破
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="h-screen bg-[#f8faf8] flex flex-col overflow-hidden text-slate-800">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-emerald-100 flex items-center justify-between px-6 h-16 shrink-0 z-50">
                        <button onClick={()=>setAppState('setup')} className="text-slate-300 hover:text-emerald-500 transition-transform"><i data-lucide="home" className="w-6 h-6"></i></button>
                        <div className="flex flex-col items-center">
                            <span className="text-[10px] font-black text-emerald-600 tracking-widest uppercase">Active Protocol</span>
                            <span className="text-[9px] font-bold text-slate-400">{sessionCount} / {targetCount}</span>
                        </div>
                        <button onClick={()=>window.location.reload()} className="text-slate-200"><i data-lucide="refresh-cw" className="w-5 h-5"></i></button>
                    </nav>

                    <main className="flex-1 flex flex-col p-4 overflow-hidden max-w-md mx-auto w-full gap-4">
                        <div className="bg-white rounded-[2.5rem] border border-emerald-50 shadow-sm p-8 space-y-4 shrink-0 relative overflow-hidden">
                            <div className="bg-emerald-400 h-1.5 absolute top-0 left-0 transition-all duration-1000 origin-left" style={{ width: `${(sessionCount/targetCount)*100}%` }} />
                            <div className="flex justify-between items-center text-[10px] font-black">
                                <span className="px-3 py-1 bg-emerald-50 text-emerald-700 rounded-full uppercase tracking-widest">{currentQ.field}</span>
                                <div className="flex gap-1.5">
                                    {[...Array(7)].map((_, i) => (
                                        <div key={i} className={`w-2.5 h-2.5 rounded-full ${i < (results[currentQ.id]?.count || 0) ? 'bg-emerald-400 shadow-[0_0_10px_rgba(52,211,153,0.8)]' : 'bg-slate-100'}`} />
                                    ))}
                                </div>
                            </div>
                            <p className="text-[19px] leading-relaxed text-[#1e293b] text-center font-bold min-h-[140px] flex items-center justify-center">{currentQ.q}</p>
                        </div>

                        {!showFeedback ? (
                            <div className={currentQ.choices.length === 2 && currentQ.choices.includes("○") ? "flex justify-center gap-10 py-6" : "flex flex-col gap-3 py-2 scrollbar-hide overflow-y-auto max-h-[40vh]"}>
                                {shuffledChoices.map(c => (
                                    <button key={c} onClick={() => handleAnswer(c)} 
                                        className={currentQ.choices.length === 2 && currentQ.choices.includes("○") 
                                            ? "w-28 h-28 text-7xl rounded-full bg-white border-2 border-emerald-50 shadow-lg active:scale-75 transition-all flex items-center justify-center transform hover:-translate-y-2"
                                            : "w-full min-h-[4rem] px-6 py-4 text-left font-black bg-white border-2 border-emerald-50 rounded-[1.5rem] active:scale-95 transition-all text-slate-700 flex items-center gap-4 shadow-sm"
                                        }>
                                        {currentQ.choices.length !== 2 && <div className="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-md" />}
                                        {c === "○" ? "🌸" : c === "×" ? "💩" : c}
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <div className="flex-1 flex flex-col min-h-0 gap-4 animate-in fade-in slide-in-from-bottom-4 duration-500 overflow-hidden">
                                <div className={`p-6 rounded-[2.5rem] border-2 shadow-md shrink-0 ${isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-orange-50 border-orange-200'}`}>
                                    <div className="flex items-center gap-5 mb-4">
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center text-white text-2xl font-black shadow-inner ${isCorrect ? 'bg-emerald-500' : 'bg-orange-400'}`}>
                                            {isCorrect ? '○' : '×'}
                                        </div>
                                        <p className="text-[14px] font-black leading-relaxed flex-1 italic text-slate-900">
                                            {isCorrect ? currentQ.fb_ok : currentQ.fb_ng}
                                        </p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={pickNext} className="flex-1 h-14 bg-emerald-600 text-white font-black rounded-2xl relative overflow-hidden active:scale-95 shadow-lg group">
                                            NEXT TARGET <i data-lucide="chevron-right" className="inline w-5 h-5 ml-1 transition-transform group-hover:translate-x-1"></i>
                                            {!isPaused && <div className="absolute bottom-0 left-0 h-1.5 bg-white/30 animate-timer-bar origin-left w-full" style={{ animationDuration: `${AUTO_NEXT_DELAY}ms` }} />}
                                        </button>
                                        <button onClick={()=>setIsPaused(!isPaused)} className={`w-14 h-14 rounded-2xl border flex items-center justify-center ${isPaused ? 'bg-orange-100 text-orange-600' : 'bg-white text-slate-300'}`}>
                                            <i data-lucide={isPaused ? "play" : "pause"} className="w-6 h-6 fill-current"></i>
                                        </button>
                                    </div>
                                    {/* 兵器ボタン（AI解析） */}
                                    <div className="grid grid-cols-4 gap-2 mt-4">
                                        {['else', 'detail', 'statute', 'practical'].map(type => (
                                            <button key={type} onClick={()=>handleAiCall(type)} 
                                                className={`py-3 rounded-xl text-[9px] font-black uppercase tracking-tighter shadow-sm btn-active border-none ${loadingState === type ? 'bg-emerald-500 text-white animate-pulse' : 'bg-white text-slate-400'}`}>
                                                {type === 'else' ? 'Else' : type === 'detail' ? 'Logic' : type === 'statute' ? 'Law' : 'Hack'}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* 🌙 戦術ログ窓 */}
                                <div className="flex-1 glass-dark rounded-t-[3rem] p-8 overflow-y-auto scrollbar-hide text-slate-300 text-[14px] leading-loose shadow-2xl border-t border-white/10">
                                    <div className="flex items-center justify-between mb-6 border-b border-white/5 pb-4">
                                        <div className="flex items-center gap-3">
                                            <i data-lucide="brain-circuit" className="w-5 h-5 text-emerald-400"></i>
                                            <span className="text-[10px] font-black text-white/20 tracking-[0.5em] uppercase">Tactical Log Core</span>
                                        </div>
                                        <span className="text-[8px] bg-emerald-900/50 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/20 font-black">FULL SPEC</span>
                                    </div>
                                    
                                    {aiContent ? (
                                        <div className="animate-in fade-in duration-700 whitespace-pre-wrap pb-12">{aiContent}</div>
                                    ) : (
                                        <div className="space-y-6">
                                            {currentQ.statute && <div className="text-emerald-400 font-black italic flex items-start gap-2"><i data-lucide="book" className="w-4 h-4 mt-1"></i> {currentQ.statute}</div>}
                                            {currentQ.else_trap && <div className="bg-white/5 p-6 rounded-2xl border border-white/5 text-slate-400 italic">{currentQ.else_trap}</div>}
                                            {currentQ.practical && <div className="text-orange-300 font-bold border-l-2 border-orange-500/50 pl-4 mb-4">{currentQ.practical}</div>}
                                            {!currentQ.statute && !currentQ.else_trap && !currentQ.practical && (
                                                <div className="h-full flex flex-col items-center justify-center opacity-10 py-10">
                                                    <i data-lucide="ghost" className="w-12 h-12 mb-3"></i>
                                                    <p className="text-[10px] font-black uppercase tracking-widest">Awaiting Analysis Command</p>
                                                </div>
