<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>

  <title>きみまろ道場 v4</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#f7f7f5;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#333;font-size:14px}
    #app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:52px}
    .header{background:#fff;border-bottom:1px solid #eee;padding:12px 16px}
    .header-row{display:flex;align-items:center;gap:10px}
    .logo{width:32px;height:32px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:#fff;flex-shrink:0}
    .header-title{font-size:14px;font-weight:bold;color:#222}
    .header-sub{font-size:10px;color:#aaa}
    .header-stats{margin-left:auto;display:flex;gap:12px}
    .stat-item{text-align:center}
    .stat-num{font-size:16px;font-weight:bold}
    .stat-label{font-size:9px;color:#666}
    .tabs{background:#fff;border-bottom:1px solid #eee;display:flex}
    .tab-btn{padding:10px 16px;font-size:12px;color:#aaa;border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;font-weight:normal}
    .tab-btn.active{color:#444;border-bottom:2px solid #444;font-weight:bold}
    .content{padding:14px}
    .card{background:#fff;border-radius:10px;border:1px solid #eee;padding:16px;margin-bottom:10px}
    .sel{background:#f7f7f5;border:1px solid #ddd;border-radius:8px;padding:7px 12px;color:#333;font-size:12px;outline:none}
    .field-tag{font-size:11px;padding:3px 10px;border-radius:99px;background:#f0f0f0;color:#555;display:inline-block}
    .q-text{font-size:14px;line-height:1.85;color:#222;margin-top:10px}
    .choice-btn{display:block;width:100%;padding:12px 16px;margin-bottom:8px;border-radius:10px;font-size:13px;cursor:pointer;text-align:left;transition:all 0.2s;background:#f7f7f5;border:1px solid #ddd;color:#333}
    .choice-btn:disabled{cursor:default}
    .choice-correct{background:#e8f5e9!important;border:1px solid #66bb6a!important;color:#2e7d32!important}
    .choice-wrong{background:#ffebee!important;border:1px solid #ef5350!important;color:#c62828!important}
    .choice-dim{background:#f7f7f5!important;border:1px solid #eee!important;color:#bbb!important}
    .fb-card{border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left-width:4px;border-left-style:solid}
    .fb-ok{background:#e8f5e9;border-color:#66bb6a}
    .fb-ng{background:#ffebee;border-color:#ef5350}
    .fb-title{font-size:13px;font-weight:bold;margin-bottom:6px}
    .fb-text{font-size:12px;color:#555;line-height:1.65}
    .fb-next{font-size:10px;color:#aaa;margin-top:6px}
    .next-btn{display:block;width:100%;padding:13px;background:#333;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:bold;cursor:pointer;text-align:center;margin-top:4px}
    .voice-toggle{padding:9px 18px;border-radius:20px;border:none;cursor:pointer;font-size:13px;font-weight:bold;transition:all 0.2s;margin-bottom:12px}
    .voice-on{background:#e05c00;color:#fff}
    .voice-off{background:#f0f0f0;color:#555}
    .voice-status{font-size:10px;color:#e05c00;margin-left:8px}
    .mic-btn{display:block;width:100%;padding:14px;border-radius:30px;border:none;font-size:15px;font-weight:bold;cursor:pointer;margin-bottom:12px;text-align:center}
    .mic-active{background:#e05c00;color:#fff}
    .mic-inactive{background:#ccc;color:#fff}
    .pred-card{text-align:center;border-top:3px solid #333}
    .pred-pct{font-size:28px;font-weight:bold;color:#333}
    .pred-label{font-size:13px;color:#555;margin:4px 0}
    .pred-sub{font-size:11px;color:#666}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .stats-box{border-radius:10px;border:1px solid #eee;padding:12px}
    .stats-num{font-size:24px;font-weight:bold}
    .stats-label{font-size:11px;opacity:0.8}
    .bar-wrap{background:#eee;border-radius:4px;height:8px;overflow:hidden;margin-top:4px}
    .bar-fill{height:100%;border-radius:4px;transition:width 0.5s}
    .weak-card{border-left-width:4px;border-left-style:solid;padding:12px 14px!important}
    .badge{font-size:10px;padding:2px 8px;border-radius:99px;background:#f0f0f0;color:#555;display:inline-block}
    .review-item{border-left:3px solid #e05c00;padding:12px 14px!important}
    .due-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:#fff5f0;color:#e05c00;border:1px solid rgba(224,92,0,0.2);display:inline-block}
    .mastered-badge{font-size:10px;padding:2px 8px;border-radius:99px;background:#f8f0ff;color:#7a4a8a;border:1px solid rgba(122,74,138,0.2);display:inline-block}
    .reset-btn{display:block;width:100%;padding:11px;background:#f5f5f5;color:#aaa;border:1px solid #eee;border-radius:10px;font-size:12px;cursor:pointer;margin-top:8px}
    .filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;font-size:11px;color:#666}
    .empty-card{text-align:center;padding:32px!important}
    .no-data{font-size:13px;color:#666}
    .wrong-log-item{border-left:2px solid #ef5350;padding-left:10px;margin-bottom:10px}
    .priority-item{border-left:3px solid #ff9800;padding-left:10px;margin-bottom:10px}
    .section-title{font-size:12px;color:#666;margin-bottom:12px;font-weight:bold}
    .field-acc-row{margin-bottom:10px}
    .field-acc-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
    a{color:inherit}
  </style>
</head>
<body>
<div id="app"></div>

<script>
const QUESTIONS = [
  { id: 1, field: "代理", tag: "代理・顕名", q: "代理人が本人のためにすることを示さずに（顕名なし）契約した場合、その法律効果は原則として代理人自身に帰属する。", a: "○", choices: ["○", "×"], fb_ok: "完璧ちゃむ！顕名がなければ代理人自身の行為とみなされるちゃむ（民法100条）。ただし相手方が知っていた・知ることができた場合は本人に帰属するちゃむ。", fb_ng: "○ちゃむ。顕名のない代理行為は代理人自身の行為とみなされる——民法100条を要確認ちゃむ。" },
  { id: 2, field: "代理", tag: "無権代理・追認", q: "無権代理人が締結した契約について、本人が事後的に認めることを【　】という。この行為があれば契約当初に遡って有効とみなされる。", a: "追認", choices: ["取消", "無効", "追認", "承認"], fb_ok: "追認、正解ちゃむ！遡及効があるのがポイントちゃむ（民法113条・116条）。きみまろ：後から認めれば最初から有効——これが追認の力だ。", fb_ng: "「追認」ちゃむ。無権代理行為は本人が追認すれば契約時に遡って有効になるちゃむ（民法113条・116条）。きみまろ：ったく、追認くらい覚えろちゃむ。" },
  { id: 3, field: "代理", tag: "自己契約・双方代理", q: "同一の法律行為について、一方当事者の代理人となりながら自ら相手方となる自己契約は、本人の許諾があれば有効な代理行為となる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！自己契約・双方代理は原則として無権代理だが、本人があらかじめ許諾した場合や単に債務を履行する場合は有効ちゃむ（民法108条）。", fb_ng: "○ちゃむ。原則は無権代理だが本人の許諾があれば例外的に有効となるちゃむ（民法108条）。" },
  { id: 4, field: "登記", tag: "不動産登記・対抗要件", q: "不動産の二重譲渡において、先に登記を備えた第二譲受人は、たとえ悪意（二重譲渡を知っていた）であっても第一譲受人に対抗できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！民法177条は「背信的悪意者」でない限り悪意でも対抗できるちゃむ。単なる悪意では対抗不可にならないちゃむ（最判昭43.8.2）。", fb_ng: "実は○ちゃむ。民法177条は悪意者でも保護するのが原則ちゃむ。「背信的悪意者」は例外ちゃむ——判例で押さえてちゃむ（最判昭43.8.2）。" },
  { id: 5, field: "登記", tag: "対抗要件", q: "不動産物権変動を第三者に対抗するためには【　】が必要である（民法177条）。", a: "登記", choices: ["引渡し", "公示", "対抗", "登記"], fb_ok: "登記、完璧ちゃむ！177条は司法書士試験の最頻出条文ちゃむ。動産の対抗要件は「引渡し」（178条）——混同注意ちゃむ。", fb_ng: "答えは「登記」ちゃむ。動産の対抗要件は「引渡し」（民法178条）——混同しやすいから要注意ちゃむ。" },
  { id: 7, field: "時効", tag: "取得時効・中断", q: "占有者が任意に占有を中止した場合、取得時効の進行は中断する（民法164条）。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！占有継続が取得時効の大前提ちゃむ。中止したら進行がリセットされるちゃむ（民法164条）。", fb_ng: "○ちゃむ。占有の中止・他主占有・所有権侵奪の3つで時効は中断するちゃむ（民法164条）。" },
  { id: 8, field: "時効", tag: "消滅時効・期間", q: "債権の消滅時効は、権利を行使できることを知った時から【　】年で完成する（民法166条・2020年改正）。", a: "5", choices: ["10年", "20年", "5", "5年"], fb_ok: "5年、正解ちゃむ！主観的起算点から5年、客観的起算点から10年ちゃむ（民法166条）。早く到来した方で時効完成ちゃむ。", fb_ng: "正解は5年ちゃむ。改正前は原則10年だったが2020年施行の改正民法で「知った時から5年」が追加されたちゃむ（民法166条）。" },
  { id: 9, field: "時効", tag: "時効の援用", q: "消滅時効は、時効期間が経過すれば当然に効力が生じるため、当事者による援用は不要である。", a: "×", choices: ["○", "×"], fb_ok: "完璧ちゃむ！×が正解ちゃむ。時効は「援用」によって初めて効力を生じるちゃむ（民法145条）。", fb_ng: "×が正解ちゃむ。時効の効果は当然発生しない——必ず「援用」が必要ちゃむ（民法145条）。" },
  { id: 10, field: "占有権", tag: "占有権・成立", q: "占有権は、物を事実上支配することによって成立し、占有の意思（所持の意思）は必要とされない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！占有権は事実上の支配（所持）があれば成立するちゃむ（民法180条）。所持の意思は自然的意思で足り、権利取得の意思は不要ちゃむ。", fb_ng: "○ちゃむ。占有権は所持という事実状態に基づく権利で、特別な意思は不要ちゃむ（民法180条）。" },
  { id: 11, field: "占有権", tag: "即時取得", q: "動産の占有者から平穏・公然・善意・無過失で動産を譲り受けた者は、即時にその動産の所有権を取得する（民法192条）。", a: "○", choices: ["○", "×"], fb_ok: "完璧ちゃむ！即時取得の要件は①取引行為②平穏・公然・善意・無過失③引渡しちゃむ（民法192条）。不動産には適用されないから注意ちゃむ。", fb_ng: "○ちゃむ。民法192条の即時取得ちゃむ。動産限定・取引行為が前提・善意無過失が要件ちゃむ。" },
  // ★修正id:12 「妨害排除」→「妨害停止」に修正（民法198条の正確な用語）
  { id: 12, field: "占有権", tag: "占有訴権・占有保持", q: "占有者がその占有を妨害されたとき、妨害の停止および損害賠償を請求できる権利を占有【　】の訴えという（民法198条）。", a: "保持", choices: ["保全", "保持", "回収", "返還"], fb_ok: "保持、正解ちゃむ！占有訴権3種を整理するちゃむ——①保全の訴え（妨害のおそれ→予防）②保持の訴え（現実の妨害→停止＋損賠）③回収の訴え（占有侵奪→返還）ちゃむ（民法197〜200条）。", fb_ng: "正解は「保持」ちゃむ（民法198条）。①保全＝妨害予防、②保持＝妨害停止・損賠、③回収＝占有返還——3種の使い分けを覚えてちゃむ。" },
  { id: 13, field: "占有権", tag: "占有回収の訴え・期限（201条3項）", q: "占有回収の訴えは、占有を奪われた時から【　】年以内に提起しなければならない（民法201条3項）。", a: "1", choices: ["1", "3年", "5年", "2年"], fb_ok: "1年、正解ちゃむ！占有保全・保持の訴えは妨害が続く間いつでも可——回収だけ1年の期限があるちゃむ（民法201条3項）。", fb_ng: "正解は1年ちゃむ（民法201条3項）。2年でも3年でもないちゃむ。占有回収＝1年、これだけ覚えてちゃむ。" },
  { id: 14, field: "占有権", tag: "占有回収と善意承継人（200条2項）", q: "占有者がその占有を侵奪された場合、侵奪者から善意で占有を承継した第三者に対しても、占有回収の訴えを提起できる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！善意の承継人には占有回収の訴えを提起できないちゃむ（民法200条2項）。善意の第三者の守りは鉄壁——取引安全の要請ちゃむ。", fb_ng: "×ちゃむ。善意の承継人は保護されるちゃむ（民法200条2項）。侵奪者本人には訴えられるが、善意で受け継いだ第三者には不可ちゃむ。" },
  { id: 15, field: "占有権", tag: "代理占有の消滅（意思のみ）", q: "占有代理人を通じて間接占有している者が、占有をやめる意思を心の中で決めるだけで、代理占有は消滅する。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！占有は「事実上の支配」——心の中だけでは消えないちゃむ。代理占有を消すには占有代理人への意思表示など外部的行為が必要ちゃむ。", fb_ng: "×ちゃむ。内心だけでは占有は消えないちゃむ。占有は事実状態——現実に支配を手放す行為が必要ちゃむ。" },
  { id: 16, field: "占有権", tag: "善意占有者の果実取得権（189条1項）", q: "善意の占有者は、占有物から生じた果実を取得することができる（民法189条1項）。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！善意占有者には果実取得権があるちゃむ（民法189条1項）。悪意占有者は果実を返還しなければならないちゃむ。", fb_ng: "○ちゃむ。善意占有者は果実を取得できるちゃむ（民法189条1項）。善悪で天国と地獄——善意維持が命綱ちゃむ。" },
  { id: 17, field: "占有権", tag: "権利適法の推定（188条）と貸主", q: "賃借人は民法188条の「占有者適法権利推定」を根拠に、貸主（賃貸人）に対して自分に権利があると主張することができる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！188条の推定は部外者（第三者）向けちゃむ。賃貸借関係にある当事者間には通用しないちゃむ——看板は外向き、内輪には効かないちゃむ。", fb_ng: "×ちゃむ。188条は第三者保護の規定ちゃむ。権利関係が既知の当事者間では推定は働かないちゃむ。" },
  { id: 18, field: "占有権", tag: "占有改定と代理（183条）", q: "占有改定（引渡しの一形態）は、代理人を通じて行うことができる（民法183条）。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！占有改定は代理人経由でも有効ちゃむ（民法183条）。引渡し4種——現実・簡易・占有改定・指図による占有移転を整理してちゃむ。", fb_ng: "○ちゃむ。占有改定は代理人を通じてもできるちゃむ（民法183条）。" },
  { id: 19, field: "占有権", tag: "占有保全の訴えと妨害終了後", q: "占有保全の訴え（民法199条）は、妨害のおそれがなくなった後でも提起できる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！占有保全の訴えは「妨害のおそれ」がある間の予防手段ちゃむ（民法199条）。おそれが消えれば訴えの利益も消えるちゃむ。妨害が現実に起きたなら「保持の訴え」ちゃむ。", fb_ng: "×ちゃむ。保全＝予防（おそれ用）、保持＝妨害排除（現実の妨害用）ちゃむ。おそれが消えたら保全の訴えも出番終了ちゃむ。" },
  { id: 20, field: "占有権", tag: "占有承継と瑕疵の引継ぎ（187条2項）", q: "取得時効を援用するために前主の占有期間を合算する場合、前主の占有の瑕疵（悪意・有過失）も引き継がなければならない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！毒を食らわば皿まで——いいとこ取りは禁止ちゃむ（民法187条2項）。期間合算は任意だが、選んだ瞬間に瑕疵もセットでついてくるちゃむ。", fb_ng: "○ちゃむ。前主の占有を合算するなら瑕疵も承継するちゃむ（民法187条2項）。善意無過失の期間だけ選んで合算、はできないちゃむ。" },
  { id: 21, field: "債権", tag: "契約不適合責任（563条）", q: "買った物に欠陥があった場合、買主は追完（修補）を請求できるが、売主が応じない場合はさらに代金の減額を請求することもできる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！563条ちゃむ。直せないなら安くする——契約不適合責任の追完→減額の流れを押さえるちゃむ。きみまろ：資本主義の基本だろ。", fb_ng: "○ちゃむ。追完請求が先で、応じない場合に減額請求へ進めるちゃむ（民法563条）。順序も試験に出るちゃむ。" },
  { id: 22, field: "債権", tag: "賃貸借・敷金（622条の2）", q: "敷金返還請求権は、賃貸借契約が終了し、かつ建物を明け渡した後でなければ行使することができない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！622条の2ちゃむ。明け渡しが先、返金は後——大家さんの担保機能を守る規定ちゃむ。きみまろ：金は後だ。順番を間違えるな。", fb_ng: "○ちゃむ。敷金は「契約終了＋明け渡し」の両方が揃って初めて返還請求できるちゃむ（民法622条の2）。片方だけでは不可ちゃむ。" },
  { id: 23, field: "債権", tag: "不法行為・責任能力（712条）", q: "未成年者であっても、自己の行為の責任を弁識する能力（責任能力）があれば、不法行為による損害賠償責任を負う。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！712条ちゃむ。責任能力があれば年齢に関わらず本人が責任を負うちゃむ。なければ監督義務者（親）が払うちゃむ。きみまろ：能力があれば未成年でも責任を負う——これが法の公平さだ。", fb_ng: "○ちゃむ。未成年でも責任能力があれば賠償責任を負うちゃむ（民法712条）。能力の有無が分岐点ちゃむ。" },
  { id: 24, field: "債権", tag: "契約の解除（541条）", q: "債務者に帰責事由（落ち度・過失）がなくても、債務が履行されない場合には契約を解除することができる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！R2改正で解除は「債務者への制裁」から「契約からの解放手段」に位置づけが変わったちゃむ（民法541条）。帰責事由は不要ちゃむ。", fb_ng: "○ちゃむ。改正後の解除は帰責事由不要ちゃむ（民法541条）。損害賠償は帰責事由が必要だが、解除は別物——ここが改正の核心ちゃむ。" },
  { id: 25, field: "債権", tag: "詐害行為取消権（424条）", q: "詐害行為取消権を行使するには、必ず裁判（訴え）によらなければならない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！424条1項ちゃむ。裁判外で勝手に取り消すことはできないちゃむ。必ず訴訟による——社会的安定のための要件ちゃむ。", fb_ng: "○ちゃむ。詐害行為取消権は裁判上のみ行使可能ちゃむ（民法424条1項）。債権者代位権と混同しやすいが、こちらは訴え必須ちゃむ。" },
  { id: 26, field: "債権", tag: "消滅時効・二重期間（R2改正）", q: "債権は、権利を行使できることを「知った時」から5年、または「行使できる時」から10年で時効にかかる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：知った時から5年、客観的に10年——早く到来した方で時効完成ちゃむ（民法166条）。", fb_ng: "○ちゃむ。きみまろ：主観的起算点（知った時）から5年、客観的起算点（行使できる時）から10年——どちらか早い方が適用されるちゃむ（民法166条）。" },
  { id: 27, field: "債権", tag: "法定利率・変動制（R2改正）", q: "現在の法定利率は年3％に固定されており、将来にわたって変動することはない。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：3年ごとに見直される「変動制」だちゃむ（民法404条）。スタートが年3％で、世の中の金利に合わせて動くちゃむ。固定と変動を混同するなちゃむ。", fb_ng: "×ちゃむ。きみまろ：固定じゃない——3年ごとの変動制だぞちゃむ（民法404条）。R2改正の重要ポイントちゃむ。" },
  { id: 28, field: "債権", tag: "債権譲渡・譲渡制限特約（R2改正）", q: "譲渡制限の特約がある債権を他人に譲渡した場合、その譲渡は原則として無効になる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：改正で原則「有効」になったちゃむ（民法466条2項）。ただし悪意・重過失の譲受人には債務者は支払いを拒めるちゃむ。", fb_ng: "×ちゃむ。きみまろ：改正前は無効だったが、R2改正で原則「有効」に変わったちゃむ（民法466条2項）。改正前後の違いが試験に出るちゃむ。" },
  { id: 29, field: "債権", tag: "相殺・期限の利益（508条）", q: "自分の債権に弁済期の定めがある場合、その期限が来る前でも相手の承諾なしに相殺することができる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：相手の期限の利益を奪うなちゃむ（民法508条）。自分の期限が来てからやるのが筋——勝手に相殺は許されないちゃむ。", fb_ng: "×ちゃむ。きみまろ：自分の期限が未到来なら相殺不可ちゃむ（民法508条）。相手の期限の利益を一方的に奪えないちゃむ。" },
  { id: 30, field: "債権", tag: "個人根保証・極度額（R2改正）", q: "個人が根保証契約の保証人になる場合、契約書に極度額（上限金額）を定めていないと、その契約は無効となる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：465条の2ちゃむ。極度額のない個人根保証契約は無効——保証人保護の核心ちゃむ。", fb_ng: "○ちゃむ。きみまろ：個人根保証は極度額必須ちゃむ（民法465条の2）。書いてなければ契約ごと無効ちゃむ。" },
  { id: 36, field: "不動産登記法", tag: "所有権保存・相続人（74条1項1号）", q: "表題部所有者の相続人は、直接自己の名義で所有権保存登記を申請できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：不登法74条1項1号ちゃむ。わざわざ死者名義にする必要なし——ショートカットだちゃむ。", fb_ng: "○ちゃむ。きみまろ：相続人は直接保存登記を申請できるちゃむ（不登法74条1項1号）。迂回不要ちゃむ。" },
  { id: 37, field: "不動産登記法", tag: "仮登記・単独申請（107条1項）", q: "義務者の承諾がある場合、権利者は単独で仮登記を申請できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：不登法107条1項ちゃむ。承諾書があれば一人でOK——仮の身軽さだぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：義務者の承諾書があれば権利者単独で仮登記申請可ちゃむ（不登法107条1項）。" },
  { id: 38, field: "不動産登記法", tag: "登記識別情報・不通知（21条）", q: "本人が希望しない場合、登記官は登記識別情報を通知しないことができる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：不登法21条ちゃむ。管理が怖いなら『いらん』と言える——これも一つの戦略だぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：登記識別情報は本人の申出で不通知にできるちゃむ（不登法21条）。" },
  { id: 39, field: "不動産登記法", tag: "休眠担保権の抹消（70条3項）", q: "抵当権者が不明で20年経過し、登記された被担保債権額を全額供託すれば、設定者は単独で抹消申請できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：不登法70条3項ちゃむ。20年＋供託——この数字と条件は記述式でも必須だぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：20年経過＋全額供託で単独抹消申請可ちゃむ（不登法70条3項）。数字を刻んでちゃむ。" },
  { id: 40, field: "不動産登記法", tag: "信託登記・同時申請", q: "信託の登記は、所有権移転登記と同時に申請しなければならない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：信託と移転はセット——切り離し不可だちゃむ（不登法98条）。一気呵成にやれちゃむ。", fb_ng: "○ちゃむ。きみまろ：信託登記は所有権移転登記と必ず同時申請ちゃむ（不登法98条）。単独申請は不可ちゃむ。" },
  { id: 41, field: "不動産登記法", tag: "更正登記・付記登記（66条）", q: "利害関係人の承諾がある場合、更正登記は付記登記で行うことができる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：不登法66条ちゃむ。承諾があれば付記、なければ主登記——この分岐で点数が変わるぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：利害関係人の承諾があれば付記登記、なければ主登記ちゃむ（不登法66条）。" },
  { id: 42, field: "不動産登記法", tag: "共有持分の処分", q: "共有者の一人は、他の共有者の同意なく共有者全員の持分をまとめて売却できる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：他人の物は売れんちゃむ。自分の持分だけにしとけ——民法251条ともリンクだぞちゃむ。", fb_ng: "×ちゃむ。きみまろ：自分の持分のみ単独処分可ちゃむ。他の共有者の持分には手を出すなちゃむ。" },
  { id: 43, field: "不動産登記法", tag: "登録免許税・売買vs相続", q: "所有権移転の登録免許税の税率は、売買と相続で同じである。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：売買20/1000、相続4/1000ちゃむ（登録免許税法別表第一）。相続の方が断然安い——実務の肝だぞちゃむ。", fb_ng: "×ちゃむ。きみまろ：売買＝20/1000、相続＝4/1000ちゃむ。5倍の差があるちゃむ。" },
  { id: 44, field: "不動産登記法", tag: "補正と即時却下", q: "登記申請に不備があっても、すぐに補正可能であれば、登記官は即時に却下することはできない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：補正の機会は与えられるちゃむ（不登法25条・補正制度）。法務局は手続きの番人だぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：補正可能なら即却下は不可ちゃむ。補正の機会を与えてから却下ちゃむ。" },
  { id: 45, field: "不動産登記法", tag: "相続登記義務化（R6改正）", q: "相続人は、相続によって不動産の取得を知った日から3年以内に登記を申請する義務がある（令和6年4月1日施行）。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：令和6年4月1日施行の超重要改正ちゃむ（不登法76条の2）。放置は過料——絶対覚えろちゃむ。", fb_ng: "○ちゃむ。きみまろ：3年以内の申請義務、違反は過料ちゃむ（不登法76条の2）。この数字は一生忘れるなちゃむ。" },
  { id: 46, field: "登記", tag: "相続と登記・二重譲渡", q: "被相続人から土地を買った者が、相続人を通じて善意の第三者に売却・登記された場合、買主は登記なしに対抗できる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：相続人は本人と同じ地位——結局は二重譲渡の登記早い者勝ちだちゃむ（最判昭49.3.19）。", fb_ng: "×ちゃむ。きみまろ：登記なければ対抗不可ちゃむ。相続人経由でも二重譲渡のルールが適用されるちゃむ（最判昭49.3.19）。" },
  { id: 47, field: "登記", tag: "共有・軽微な変更（R5改正）", q: "共有物の軽微な変更をするには、共有者全員の同意が必要である。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：R5改正ちゃむ（民法251条1項）。軽微な変更は持分過半数で決定できるようになったぞちゃむ。", fb_ng: "×ちゃむ。きみまろ：R5改正で軽微な変更は過半数でOKになったちゃむ（民法251条1項）。全員同意は形状・効用の著しい変更の話ちゃむ。" },
  { id: 48, field: "登記", tag: "附合・畳・障子", q: "賃借人が取り付けた畳や障子は、建物の所有者のものになる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：簡単に外せるものは附合しないちゃむ（民法242条但書）。独立した物だぞちゃむ。", fb_ng: "×ちゃむ。きみまろ：附合するのは取り外しが社会経済上不相当な場合ちゃむ（民法242条）。畳・障子は外せるから附合しないちゃむ。" },
  { id: 49, field: "担保物権", tag: "留置権・有益費", q: "賃貸借終了後、賃借人が修理費（有益費）を支払ってもらっていない場合、建物を留置することができる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：有益費償還請求権は留置権の被担保債権になるちゃむ（民法295条）。弁済を受けるまで留置できる——最強の立てこもり権だちゃむ。", fb_ng: "○ちゃむ。きみまろ：有益費償還請求権は留置権の被担保債権になるちゃむ（民法295条）。弁済を受けるまで留置できるちゃむ。" },
  // ★修正id:50 「1位・3位」という根拠不明確な表現を削除し正確な条文表現に修正
  { id: 50, field: "担保物権", tag: "先取特権vs質権の優先（334条）", q: "動産売買の先取特権と動産質権が競合した場合、優先するのは【　】である（民法334条）。", a: "質権", choices: ["質権", "先取特権", "留置権", "抵当権"], fb_ok: "質権、正解ちゃむ！きみまろ：民法334条ちゃむ。動産の先取特権と動産質権が競合したときは質権が優先する——これが334条の核心だぞちゃむ。", fb_ng: "「質権」ちゃむ。きみまろ：民法334条ちゃむ。動産売買先取特権と動産質権が競合すると質権が優先するちゃむ。条文番号とセットで覚えてちゃむ。" },
  { id: 51, field: "担保物権", tag: "不動産質権・利息", q: "不動産質権者は、特約がなくても利息を請求することができる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：家賃（果実）をもらうなら利息は我慢しろちゃむ（民法358条）。二重取り禁止だぞちゃむ。", fb_ng: "×ちゃむ。きみまろ：不動産質権者は果実収取権があるから、原則として利息請求不可ちゃむ（民法358条）。" },
  { id: 52, field: "担保物権", tag: "抵当権・付加一体物（370条）", q: "抵当権の効力は、増築部分など付加して一体となった物にも及ぶ。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法370条ちゃむ。合体したらもう逃げられん——運命共同体だぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：付加一体物には抵当権の効力が及ぶちゃむ（民法370条）。増築・附合物も対象ちゃむ。" },
  { id: 53, field: "担保物権", tag: "物上代位・差押え（304条）", q: "賃料に物上代位する場合、賃料の払渡し前に差押えをしなければならない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法304条ちゃむ。相手のポッケに入る前に捕まえろ——スピード勝負だちゃむ。払渡し後は特定性が失われて物上代位不可ちゃむ。", fb_ng: "○ちゃむ。きみまろ：払渡し前の差押えが物上代位行使の要件ちゃむ（民法304条但書）。タイミングを逃すなちゃむ。" },
  { id: 54, field: "債権", tag: "賃貸借vs使用貸借・対価の有無", q: "賃貸借と使用貸借の最大の違いは賃料（対価）の有無である。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：金を払えばビジネス、タダなら人情だちゃむ。賃貸借＝有償（民法601条）、使用貸借＝無償（民法593条）——基本中の基本ちゃむ。", fb_ng: "○ちゃむ。きみまろ：賃貸借＝有償（民法601条）、使用貸借＝無償（民法593条）——対価の有無が本質的な違いちゃむ。" },
  { id: 55, field: "債権", tag: "使用貸借・借主の死亡（597条3項）", q: "使用貸借は、借主が死亡した場合でも相続人に引き継がれる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法597条3項ちゃむ。タダ貸しは『お前だから』——死ねば終了だぞちゃむ。人的信頼関係に基づく契約だからちゃむ。", fb_ng: "×ちゃむ。きみまろ：使用貸借は借主の死亡で終了ちゃむ（民法597条3項）。人的信頼関係に基づく契約だからちゃむ。" },
  { id: 56, field: "債権", tag: "使用貸借・返還時期の定めなし", q: "使用貸借で返還時期も使用目的も定めなかった場合、貸主はいつでも返還を請求できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法598条2項ちゃむ。目的があれば終わるまで、なければいつでもOK——使い分けを覚えてちゃむ。", fb_ng: "○ちゃむ。きみまろ：時期も目的も定めなければ貸主はいつでも返還請求可ちゃむ（民法598条2項）。" },
  { id: 57, field: "民法総則", tag: "成年被後見人・日用品以外（9条）", q: "成年被後見人が、日用品の購入以外の法律行為を単独で行った場合、後見人は常にこれを取り消すことができる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法9条ちゃむ。日用品以外なら、たとえ後見人の同意があっても取り消せる——本人の保護が最優先だぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：成年被後見人の行為は日用品購入以外すべて取り消し可ちゃむ（民法9条）。同意があっても同じだぞちゃむ。" },
  { id: 58, field: "民法総則", tag: "未成年者・詐術（21条）", q: "未成年者が「自分は成人だ」と嘘をついて相手を信じ込ませた（詐術）場合、その契約は取り消せない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法21条ちゃむ。嘘をついて相手を騙した奴まで守る必要はない——自業自得だろちゃむ。", fb_ng: "○ちゃむ。きみまろ：詐術を用いた未成年者は取り消し権を失うちゃむ（民法21条）。自分で作った罠には自分で落ちろちゃむ。" },
  { id: 59, field: "民法総則", tag: "公序良俗違反（90条）", q: "公序良俗に反する内容の契約は、当事者双方が合意していても法律上無効である。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法90条ちゃむ。社会のルールを無視した契約は法律が力を貸さない——絶対的無効だぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：公序良俗違反は当事者の合意に関わらず絶対的無効ちゃむ（民法90条）。意思自治にも限界があるちゃむ。" },
  { id: 60, field: "民法総則", tag: "心裡留保（93条1項）", q: "冗談で意思表示をした場合、相手方がそれを冗談だと知っていた（悪意）、または知ることができた（有過失）なら、その意思表示は無効となる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法93条1項但書ちゃむ。相手が悪意または有過失なら保護する必要はないぞちゃむ。善意無過失の相手だけ保護するちゃむ。", fb_ng: "○ちゃむ。きみまろ：相手方が悪意または有過失なら心裡留保の意思表示は無効ちゃむ（民法93条1項但書）。" },
  { id: 61, field: "民法総則", tag: "錯誤・取り消しへ改正（95条）", q: "錯誤による意思表示は、R2改正後も「無効」である。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法95条ちゃむ。改正で「無効」から「取り消し」に変わったぞちゃむ——まだ間違える奴が多いから注意しろちゃむ。", fb_ng: "×ちゃむ。きみまろ：R2改正で錯誤は「無効」→「取り消し」に変わったちゃむ（民法95条）。改正前後の違いをしっかり刻んでちゃむ。" },
  { id: 62, field: "民法総則", tag: "自己契約・無権代理（108条）", q: "代理人が本人の許可なく自分自身と契約すること（自己契約）は、原則として無権代理行為とみなされる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法108条ちゃむ。自分一人で両方の立場をやるのは不公平——本人の承諾があればOKだけどなちゃむ。", fb_ng: "○ちゃむ。きみまろ：自己契約・双方代理は原則無権代理ちゃむ（民法108条）。本人の許諾か債務履行のみ例外ちゃむ。" },
  { id: 63, field: "民法総則", tag: "表見代理（109・110・112条）", q: "代理権がないのに代理権があるかのような外観があり、相手方が善意無過失でそれを信じた場合、本人はその責任を負う。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法109・110・112条ちゃむ。本人が外観を作った以上、信じた相手を守るのが公平——取引安全の核心だちゃむ。", fb_ng: "○ちゃむ。きみまろ：表見代理は本人の帰責性＋相手方の善意無過失が要件ちゃむ（民法109〜112条）。取引安全の核心ちゃむ。" },
  { id: 64, field: "民法総則", tag: "無効行為の追認（119条）", q: "最初から無効な行為を後から追認しても、それによって新たな行為をしたものとはみなされない。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法119条ちゃむ。無効な行為を追認したらその時から「新たな行為をした」とみなすんだぞちゃむ——遡及効はないが将来効はあるちゃむ。", fb_ng: "×ちゃむ。きみまろ：無効行為の追認は、その時点から新たな行為をしたとみなされるちゃむ（民法119条）。遡及効はないが将来効はあるちゃむ。" },
  { id: 65, field: "民法総則", tag: "時効・完成猶予・訴え取下げ（147条）", q: "裁判上の請求をした後に訴えを取り下げた場合でも、取り下げ時から6ヶ月間は時効が完成しない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法147条1項ちゃむ。取り下げても6ヶ月の猶予は残る——この間に次の手を打てちゃむ。", fb_ng: "○ちゃむ。きみまろ：訴え取下げ後も6ヶ月間は完成猶予が続くちゃむ（民法147条1項）。猶予期間を活かして次の手を打てちゃむ。" },
  { id: 66, field: "民法総則", tag: "時効利益の事前放棄（146条）", q: "時効の利益は、時効完成前にあらかじめ放棄することができる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法146条ちゃむ。時効が来る前の放棄は無効——弱者が無理やり放棄させられるのを防ぐためだちゃむ。完成後なら放棄可ちゃむ。", fb_ng: "×ちゃむ。きみまろ：時効完成前の放棄は無効ちゃむ（民法146条）。完成後なら放棄可——タイミングが全てだぞちゃむ。" },
  { id: 67, field: "親族・相続", tag: "婚姻取消し・適齢後（745条1項）", q: "不適齢（18歳未満）で婚姻した場合でも、適齢に達した後は、その婚姻を取り消すことができない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法745条1項ちゃむ。適齢に達して追認すれば取り消せない——過去より未来を優先するんだぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：適齢到達後は取り消し不可ちゃむ（民法745条1項）。適齢に達した時点で追認とみなされるぞちゃむ。" },
  { id: 68, field: "親族・相続", tag: "嫡出推定・再婚後（772条・R6改正）", q: "離婚後300日以内に生まれた子でも、母が再婚した後に生まれた場合は、現夫の子と推定される。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法772条ちゃむ。令和6年4月施行の超重要改正——二重推定を避ける合理的なルールに変更されたぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：R6改正で再婚後は現夫の子と推定されるようになったちゃむ（民法772条）。改正前後の違いを刻んでちゃむ。" },
  { id: 69, field: "親族・相続", tag: "未成年者の養子縁組・家裁許可（798条）", q: "未成年者を養子とするには原則として家庭裁判所の許可が必要だが、自己または配偶者の直系卑属を養子とする場合は許可を要しない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法798条ちゃむ。身内を養子にするなら家裁が口を挟むまでもない——ただし子の利益を忘れるなよちゃむ。", fb_ng: "○ちゃむ。きみまろ：直系卑属（孫など）を養子にする場合は家裁許可不要ちゃむ（民法798条但書）。例外の範囲を正確に覚えてちゃむ。" },
  { id: 70, field: "親族・相続", tag: "懲戒権の廃止（821条・R4改正）", q: "親権者は、子を導くために必要な範囲内で子を懲戒することができる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：R4改正で「懲戒権」という言葉自体が削除されたちゃむ（民法821条）。体罰禁止を明確にするためだ——時代は変わるんだよちゃむ。", fb_ng: "×ちゃむ。きみまろ：R4改正で懲戒権規定は削除ちゃむ（民法821条）。現在は子の利益のための監護・教育権のみちゃむ。" },
  { id: 71, field: "親族・相続", tag: "法定相続分・配偶者と兄弟（900条）", q: "配偶者と被相続人の兄弟姉妹が相続人である場合、配偶者の相続分は4分の3である。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法900条ちゃむ。配偶者＋子＝1/2、配偶者＋親＝2/3、配偶者＋兄弟＝3/4——寝ながらでも言えるようにしろちゃむ。", fb_ng: "○ちゃむ。きみまろ：配偶者と兄弟姉妹の場合、配偶者3/4・兄弟1/4ちゃむ（民法900条）。3つの組み合わせを全部覚えてちゃむ。" },
  { id: 72, field: "親族・相続", tag: "相続放棄・熟慮期間（915条）", q: "相続放棄は、自己のために相続の開始があったことを知った時から【　】ヶ月以内にしなければならない（民法915条1項）。", a: "3", choices: ["3ヶ月", "1年", "3", "6ヶ月"], fb_ok: "3ヶ月、正解ちゃむ！きみまろ：民法915条1項ちゃむ。熟慮期間の3ヶ月——過ぎたら単純承認とみなされるぞちゃむ。借金があるなら一刻も早く決断しろちゃむ。", fb_ng: "正解は3ヶ月ちゃむ。きみまろ：知った時から3ヶ月以内に家裁に申述ちゃむ（民法915条1項）。過ぎたら単純承認とみなされるぞちゃむ。" },
  { id: 73, field: "親族・相続", tag: "配偶者居住権・登記（1028条）", q: "配偶者居住権は、遺産分割・遺贈・死因贈与によって成立し、登記することで第三者に対抗できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法1028条ちゃむ。住み慣れた家を追い出されないための強力な権利——登記で第三者対抗できることもセットで覚えろちゃむ。", fb_ng: "○ちゃむ。きみまろ：配偶者居住権は登記で第三者対抗可ちゃむ（民法1028条）。成立原因と対抗要件をセットで覚えてちゃむ。" },
  { id: 74, field: "親族・相続", tag: "自筆証書遺言・法務局保管と検認", q: "自筆証書遺言を法務局に預けた場合（遺言書保管制度）、家庭裁判所での検認が不要となる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：遺言書保管法11条ちゃむ。法務局が預かってるなら偽造の心配がない——検認不要のメリットだぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：法務局保管の自筆証書遺言は検認不要ちゃむ（遺言書保管法11条）。公正証書遺言と同じく手続き簡略化のメリットがあるちゃむ。" },
  { id: 75, field: "親族・相続", tag: "遺留分侵害額請求・金銭解決（1046条）", q: "遺留分を侵害された相続人は、受遺者らに対して金銭の支払いを請求することができる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法1046条ちゃむ。以前は現物返還だったが改正で金銭解決が原則に——不動産を細切れにするトラブルを防ぐためだぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：遺留分侵害額請求は金銭解決が原則ちゃむ（民法1046条）。現物返還から金銭請求への改正ポイントを刻んでちゃむ。" },
  { id: 76, field: "親族・相続", tag: "特別寄与料（1050条）", q: "相続人ではない親族（例：長男の配偶者）が被相続人の療養看護に尽くした場合、相続人に対して金銭の支払いを請求できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法1050条ちゃむ。報われない努力に光を当てる改正だ——ただし相続開始を知った時から6ヶ月・相続開始から1年の期限があるから注意しろよちゃむ。", fb_ng: "○ちゃむ。きみまろ：特別寄与料は相続人でない親族も請求可ちゃむ（民法1050条）。期限（6ヶ月/1年）も確認してちゃむ。" },
  { id: 77, field: "担保物権", tag: "留置権・物上代位の成否", q: "留置権者が留置している物が焼失し、所有者が火災保険金請求権を取得した場合、留置権者はその保険金請求権に物上代位権を行使できる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：留置権には優先弁済権がないちゃむ（民法295条）。物上代位は優先弁済権を持つ担保物権（抵当権・質権等）のみ——留置権には認められないぞちゃむ。", fb_ng: "×ちゃむ。きみまろ：物上代位は優先弁済権を持つ担保物権にしか認められないちゃむ（民法304条等）。留置権には優先弁済権がないから不可ちゃむ。" },
  { id: 78, field: "担保物権", tag: "抵当権・債務不履行後の果実（371条）", q: "抵当権の効力は原則として果実に及ばないが、債務不履行があった後は、その後に生じた果実（賃料など）にも効力が及ぶ。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法371条ちゃむ。支払いが遅れたら賃料にも抵当権が及ぶようになるんだよちゃむ！債務不履行前後でガラッと変わるぞちゃむ。", fb_ng: "○ちゃむ。きみまろ：債務不履行前は果実に及ばないが、不履行後は及ぶちゃむ（民法371条）。タイミングが全てだぞちゃむ。" },
  // ★補強id:79 判例番号（最判平成13.3.13）追記
  { id: 79, field: "担保物権", tag: "抵当権・物上代位と相殺（判例）", q: "抵当権者が賃料債権を差し押さえる前に、賃借人が貸主に対する反対債権と賃料を相殺した場合、抵当権者はその相殺を無視して物上代位権を行使できる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：先に相殺が成立したら抵当権者でも手出しできないちゃむ（最判平成13.3.13）。差押え前の相殺は有効——スピードで負けたら終わりだぞちゃむ。", fb_ng: "×ちゃむ。きみまろ：差押え前に相殺が成立した場合、抵当権者は物上代位を行使できないちゃむ（最判平成13.3.13）。スピード勝負を忘れるなちゃむ。" },
  { id: 80, field: "担保物権", tag: "根抵当権・極度額変更（398条の5）", q: "根抵当権の極度額の変更は、利害関係人の承諾を得れば、後順位抵当権者の同意がなくても有効にできる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法398条の5ちゃむ。後順位抵当権者も利害関係人に含まれるから当然承諾が必要だぞちゃむ。勝手にパイの枠を広げるなちゃむ！", fb_ng: "×ちゃむ。きみまろ：後順位抵当権者は利害関係人に含まれるちゃむ（民法398条の5）。全員の承諾なしに極度額は変更できないちゃむ。" },
  { id: 81, field: "担保物権", tag: "不動産質権・管理費用と果実収取（356・357条）", q: "不動産質権者は管理費用を自ら負担しなければならないが、特約がなくても不動産から生じた果実を収取できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法356条・357条ちゃむ。管理費用を払う代わりに果実を収取できる——ギブ・アンド・テイクなんだよちゃむ！", fb_ng: "○ちゃむ。きみまろ：不動産質権者は管理費用負担の代わりに果実収取権があるちゃむ（民法356条・357条）。対価関係を覚えてちゃむ。" },
  { id: 82, field: "担保物権", tag: "留置権・所有者変更後の主張", q: "留置権成立後に目的物の所有者が変わった場合、留置権者は新所有者に対しても留置権を主張できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：留置権は物権——誰に対しても主張できるぞちゃむ（民法295条）。所有者が変わっても留置権は消えないちゃむ！", fb_ng: "○ちゃむ。きみまろ：留置権は物権だから誰に対しても主張できるちゃむ（民法295条）。所有者が変わっても留置権は消えないぞちゃむ。" },
  { id: 83, field: "担保物権", tag: "抵当権・借地権への効力（判例）", q: "建物に抵当権を設定した場合、その建物の所有を目的とする借地権にも抵当権の効力が及ぶ。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：建物だけ担保に取っても土地を使う権利がなきゃ建物は価値ゼロだろちゃむ。借地権は建物の従たる権利としてセットで担保されるぞちゃむ（判例通説）。", fb_ng: "○ちゃむ。きみまろ：建物抵当権の効力は敷地の借地権にも及ぶちゃむ（判例）。従たる権利として一体で担保されるぞちゃむ。" },
  { id: 84, field: "担保物権", tag: "共同抵当・次順位者の代位（392条2項）", q: "複数の不動産に共同抵当が設定されている場合、一部の不動産が競売されたとき、その不動産の後順位抵当権者は他の不動産の抵当権に代位できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法392条2項ちゃむ。先に犠牲になった不動産の後順位者を救済するための代位制度だちゃむ！計算問題でも出るから仕組みを体に刻んでおけちゃむ。", fb_ng: "○ちゃむ。きみまろ：392条2項の代位制度ちゃむ。計算問題でも出るから仕組みを体に刻んでおけちゃむ。" },
  // ★補強id:85 判例番号（最判平6.2.22）追記・問題文を明確化
  { id: 85, field: "担保物権", tag: "譲渡担保・清算金と第三者（判例）", q: "譲渡担保において、債権者が清算金を支払わずに目的物を善意の第三者に売却した場合、債務者はその第三者に対して目的物の返還を請求できる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：善意の第三者が介入したら物の返還請求は不可ちゃむ（最判平6.2.22）。債務者にできるのは債権者への損害賠償請求だけだぞちゃむ。", fb_ng: "×ちゃむ。きみまろ：善意の第三者が介入したら物の返還請求は不可ちゃむ（最判平6.2.22）。債権者への損害賠償請求に切り替えろちゃむ。" },
  { id: 86, field: "担保物権", tag: "抵当権消滅請求・差押え後（382条）", q: "抵当不動産の第三取得者は、競売による差押えの効力が発生した後でも、抵当権消滅請求をすることができる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法382条ちゃむ！差押えの効力が生じる前までが消滅請求のタイムリミットだぞちゃむ。手遅れになってから『消して』は通らないちゃむ。", fb_ng: "×ちゃむ。きみまろ：差押えの効力発生前までが消滅請求のタイムリミットちゃむ（民法382条）。期限を過ぎたら終わりだぞちゃむ。" },
  { id: 87, field: "年代別マスター", tag: "物権変動・二重譲渡（判例）", q: "Aから土地を買ったBが登記前に、Aを相続したCがDに売却して登記した場合、BはDに勝てる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：相続人Cは被相続人Aと同じ地位——BとDの関係は二重譲渡と同じ構図で登記早い者勝ちだぞちゃむ（民法177条・最判昭49.3.19）。", fb_ng: "×ちゃむ。きみまろ：相続人は本人と同じ地位——BとDの二重譲渡と同じ構図ちゃむ（最判昭49.3.19）。先に登記したDの勝ちちゃむ。" },
  { id: 88, field: "年代別マスター", tag: "不法行為と相殺（509条）", q: "悪意による不法行為で生じた損害賠償債務を自働債権として、相手方の債権と相殺することはできる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法509条1号ちゃむ。悪いことをした奴が『チャラね』なんて虫のいい話が通るか！被害者の現実的な救済を優先するんだよちゃむ！", fb_ng: "×ちゃむ。きみまろ：悪意の不法行為による損害賠償債務は自働債権として相殺不可ちゃむ（民法509条1号）。被害者保護が最優先ちゃむ。" },
  // ★補強id:89 「本人が無権代理人を相続した場合」との対比を追記
  { id: 89, field: "年代別マスター", tag: "無権代理と相続（判例）", q: "無権代理人が本人を単独相続した場合、その無権代理行為は当然に有効となる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：最判昭40.6.18ちゃむ。本人の地位と無権代理人の地位が合体——信義則上、追認拒絶は許されないから有効になるぞちゃむ。逆に『本人が無権代理人を相続』した場合は追認拒絶できる点も要チェックちゃむ！", fb_ng: "○ちゃむ。きみまろ：無権代理人が本人を単独相続した場合は有効ちゃむ（最判昭40.6.18）。信義則上、追認拒絶は許されないぞちゃむ。ただし『本人が無権代理人を相続』した場合は追認拒絶できる——逆パターンも必ず押さえてちゃむ！" },
  { id: 90, field: "年代別マスター", tag: "共有物の管理（252条・R5改正）", q: "共有物の管理に関する事項は、共有者の持分の価格の過半数で決定することができる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法252条ちゃむ。R5改正で軽微な変更も過半数でいけるようになったぞちゃむ。全員一致じゃなきゃ動けないなんて時代遅れなんだよちゃむ！", fb_ng: "○ちゃむ。きみまろ：共有物の管理は持分価格の過半数で決定可ちゃむ（民法252条）。R5改正で軽微変更も過半数に統一されたぞちゃむ。" },
  { id: 91, field: "年代別マスター", tag: "賃借人の修繕権（607条の2）", q: "賃貸物の修繕が必要な場合、賃借人が賃貸人に通知したのに相当期間内に修繕されないときは、賃借人が自ら修繕することができる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法607条の2ちゃむ。雨漏りしてるのに大家が動かないなら自分で直すしかないだろちゃむ。その権利を法律が認めてやったんだぞちゃむ！", fb_ng: "○ちゃむ。きみまろ：相当期間内に修繕されない場合、賃借人の自力修繕が認められるちゃむ（民法607条の2）。" },
  { id: 92, field: "年代別マスター", tag: "契約不適合・追完→減額（563条）", q: "種類・品質の不適合時、買主は追完請求なしに直ちに代金減額請求ができる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：まずは『直せ（追完）』と言うのがルールだぞちゃむ（民法563条）。追完不能など例外以外は順序を守れちゃむ！", fb_ng: "×ちゃむ。きみまろ：追完請求が先、応じない場合に減額請求ちゃむ（民法563条）。追完不能など例外以外は順序を守れちゃむ。" },
  { id: 93, field: "年代別マスター", tag: "遺留分侵害額請求・金銭解決（1046条）", q: "遺留分を侵害された相続人は、受贈者等に対し遺留分侵害額に相当する金銭の支払いを請求できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法1046条ちゃむ。昔は『現物を返せ』だったが今は『金で解決』だぞちゃむ。不動産を細切れにするより合理的だろちゃむ！", fb_ng: "○ちゃむ。きみまろ：遺留分侵害額請求は金銭支払請求ちゃむ（民法1046条）。現物返還から金銭解決への改正を刻んでちゃむ。" },
  { id: 94, field: "年代別マスター", tag: "時効の更新・権利の承認（152条）", q: "権利の承認があった場合、時効は更新され、それまで経過した期間はリセットされて新たに進行を始める。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法152条ちゃむ。『認めちゃった』ならそこから再スタートだぞちゃむ。完成猶予（止まるだけ）と更新（リセット）の違いも整理しておけちゃむ。", fb_ng: "○ちゃむ。きみまろ：承認による時効更新は経過期間をゼロにリセットちゃむ（民法152条）。完成猶予と更新の違いも整理しておけちゃむ。" },
  { id: 95, field: "年代別マスター", tag: "所有者不明土地管理人（R5改正）", q: "所有者が不明な土地について、利害関係人は裁判所に対して所有者不明土地管理人の選任を請求できる。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：R5改正で新設された制度だぞちゃむ（民法264条の2）。持ち主が分からなくても管理人が代わりに動けるようにしたんだちゃむ。登記実務の主役になるぞちゃむ！", fb_ng: "○ちゃむ。きみまろ：所有者不明土地管理制度はR5改正の目玉ちゃむ（民法264条の2）。利害関係人が申立て→裁判所が管理人選任の流れを覚えてちゃむ。" },
  { id: 96, field: "年代別マスター", tag: "相続登記義務化（R6）", q: "相続人は取得を知った日から3年以内に登記申請をしなければならない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：令和6年からの超重要改正だぞちゃむ（不登法76条の2）。過料があるから放置厳禁ちゃむ！", fb_ng: "○ちゃむ。きみまろ：取得を知った日から3年以内が義務・違反は過料ちゃむ（不登法76条の2）。絶対覚えてちゃむ。" },
  { id: 97, field: "年代別マスター", tag: "物上代位と払渡し後（304条）", q: "抵当権者が賃料債権に物上代位する際、賃料がすでに支払われた後でも抵当権者はその現金を差し押さえることができる。", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！きみまろ：民法304条但書ちゃむ！『払渡し又は引渡し前』に差し押さえろちゃむ。相手の手に渡って他の金と混ざっちまったら、もう特定できねえんだよちゃむ！", fb_ng: "×ちゃむ。きみまろ：払渡し後は特定性が失われて物上代位不可ちゃむ（民法304条但書）。払渡し前の差押えがタイムリミットだぞちゃむ。" },

  // ── 物権法第1章：物権的請求権（12問）──
  { id: 101, field: "物権的請求権", tag: "妨害排除・責任能力不要", q: "所有権に基づく妨害排除請求権は、相手方がその妨害について責任能力を欠いている場合であっても、その成立を妨げられない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！物権的請求権は物権の円満な支配を回復する権利だちゃむ。相手方の故意・過失や責任能力は問われないぞちゃむ——不法行為と混同するなちゃむ。", fb_ng: "○ちゃむ。物権的請求権の成立に相手方の責任能力は不要ちゃむ。不法行為責任（709条）とは別物——混同注意ちゃむ。" },
  { id: 102, field: "物権的請求権", tag: "妨害排除・請求の相手方", q: "AがBの所有車を盗み、Cの土地に無権原で放置している。このときCは所有者Bに対し、車両の撤去を請求できるか？", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！請求の相手方は現に妨害状態を作り出している者ちゃむ。この場合は盗んだAに対して行うべきだぞちゃむ。所有者Bは妨害を作出していないから請求不可ちゃむ。", fb_ng: "×ちゃむ。妨害排除請求の相手方は現に妨害状態を作出・維持している者ちゃむ。所有者Bではなく盗んだAが相手方だぞちゃむ。" },
  { id: 103, field: "物権的請求権", tag: "登記賃借権と妨害排除", q: "登記ある土地賃借人は、土地を不法占拠する建物の所有者に対し、妨害排除請求権を行使できるか？", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！登記された賃借権は物権化するから第三者への妨害排除が可能になるぞちゃむ（民法605条・借地借家法10条等）。登記の力は偉大だぞちゃむ。", fb_ng: "○ちゃむ。登記された賃借権は対抗力を持ち、物権的請求権に準じた妨害排除が可能ちゃむ（民法605条）。登記なければ第三者に対抗不可ちゃむ。" },
  { id: 104, field: "物権的請求権", tag: "行為請求権説・費用負担", q: "不可抗力で倒れた木の撤去費用について、「行為請求権説」に立つと相手方が負担することになるか？", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！行為請求権説＝相手に『片付けろ』という行為を求める権利ちゃむ。よって費用は片付ける側（相手方）が負担するのが論理的帰結だぞちゃむ——×ではなく○が正解ちゃむ。", fb_ng: "×ちゃむ。行為請求権説に立つと、撤去という行為を相手方に求めるため費用は相手方負担が帰結ちゃむ。忍容請求権説だと費用は請求者側が負担するちゃむ——学説の違いを整理してちゃむ。" },
  { id: 105, field: "物権的請求権", tag: "登記請求権・賃借権", q: "賃借権には、特約がない限り、借り手側に登記請求権は認められない。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！賃借権は債権だから、売買のような『登記協力義務』が当然には発生しないちゃむ（民法601条）。特約があれば別の話だぞちゃむ。", fb_ng: "○ちゃむ。賃借権は債権であり、特約なき限り賃貸人に登記義務はないちゃむ（民法601条）。不動産売買と混同しないようにちゃむ。" },
  { id: 106, field: "物権的請求権", tag: "物権的登記請求権・取消後", q: "強迫による取消し後に求める登記抹消請求権は、「物権的登記請求権」に分類されるか？", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！取消しで所有権が自分に戻った状態での抹消請求だから物権的登記請求権になるぞちゃむ。物権があることを根拠にする請求——債権的請求権と区別して覚えてちゃむ。", fb_ng: "○ちゃむ。取消しにより所有権が復帰した状態（物権がある）での請求だから物権的登記請求権ちゃむ。物権的・債権的・物権変動的の3種を整理しておけちゃむ。" },
  { id: 107, field: "物権的請求権", tag: "解除前の第三者・登記要件（545条）", q: "解除「前」の第三者が保護されるためには、所有権移転登記を備えている必要がある。", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！民法545条1項但書の保護を受けるには、解除される前に登記という対抗要件を持っていないとダメだぞちゃむ。善意は不要・登記が必須——ここが試験の急所ちゃむ。", fb_ng: "○ちゃむ。解除前の第三者は545条1項但書で保護されるが、登記を備えていることが必要ちゃむ。善意悪意は問わないが登記は必須——判例も同旨ちゃむ。" },
  { id: 108, field: "物権的請求権", tag: "解除後の第三者・対抗関係", q: "解除「後」に現れた第三者との関係は、登記の有無に関わらず解除した側が勝つか？", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！解除後は早い者勝ち（対抗関係）ちゃむ。先に登記を備えた方が勝利するぞちゃむ（判例・通説）。解除前と解除後で結論が逆になる——ここが超頻出の引っかけちゃむ。", fb_ng: "×ちゃむ。解除後の第三者とは対抗関係になるから、先に登記した方が勝つちゃむ（判例）。解除前は545条1項但書、解除後は177条——条文と場面の対応を整理してちゃむ。" },
  { id: 109, field: "物権的請求権", tag: "時効完成前の第三者・登記不要", q: "時効完成「前」に現れた第三者に対し、取得者は登記なしで対抗できるか？", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！完成前に現れた者は当事者の延長線上——登記がなくても対抗できるぞちゃむ（判例）。時効完成前後で結論が逆になる最重要ポイントちゃむ。", fb_ng: "○ちゃむ。時効完成前の第三者は「当事者」に準じる地位にあるから、登記なしで対抗可能ちゃむ（判例）。完成後と混同するなよちゃむ。" },
  { id: 110, field: "物権的請求権", tag: "時効完成後の第三者・登記必要", q: "時効完成「後」に現れた第三者に対し、取得者は登記なしで対抗できるか？", a: "×", choices: ["○", "×"], fb_ok: "正解ちゃむ！完成後に現れた者は「第三者」だから登記早い者勝ちのレースになるぞちゃむ（最判昭33.8.28）。登記をサボってる間に現れた人には負けるちゃむ——完成前と逆の結論ちゃむ。", fb_ng: "×ちゃむ。時効完成後の第三者とは177条の対抗関係になるから、登記なしでは対抗不可ちゃむ（最判昭33.8.28）。完成前は登記不要・完成後は登記必要——この対比を体に刻んでちゃむ。" },
  { id: 111, field: "物権的請求権", tag: "二次の時効取得（判例）", q: "時効完成後に第三者が登記しても、その後さらに時効期間占有すれば「再度の時効取得」が可能か？", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！判例上認められている『二次の時効取得』だぞちゃむ（最判昭36.7.20）。一度登記で負けても、しつこく占有し続ければ逆転勝利もあり得る——粘りが武器ちゃむ。", fb_ng: "○ちゃむ。第三者の登記後もさらに時効期間占有を継続すれば再度の時効取得が可能ちゃむ（最判昭36.7.20）。二次の時効取得として判例上認められているぞちゃむ。" },
  { id: 112, field: "物権的請求権", tag: "時効取得・原始取得と抵当権消滅", q: "善意無過失で10年占有して時効取得した場合、その土地にあった抵当権は消滅するか？", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！時効取得は原始取得だぞちゃむ。前の持ち主の負の遺産（抵当権・地上権等）もまるごと消え去る強力な効果があるちゃむ。更地状態でスタートできるのが原始取得の醍醐味ちゃむ。", fb_ng: "○ちゃむ。時効取得は原始取得だから、取得前に設定されていた抵当権等の制限物権は消滅するちゃむ。承継取得との最大の違いをここで押さえてちゃむ。" },
  // ── 物権法第5〜6章：相続と登記・明認方法（5問）──
  { id: 113, field: "物権的請求権", tag: "登記引取請求権", q: "不動産の売主が買主に対し、買主名義への登記移転を請求する権利（登記引取請求権）は認められているか？", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！売主名義のまま放置されると固定資産税等の負担が続くから、売主側から『早く名義を変えてくれ！』と請求できるぞちゃむ（判例・通説）。実務でも重要な権利ちゃむ。", fb_ng: "○ちゃむ。登記引取請求権は判例・通説上認められているちゃむ。名義が残ると税負担等が続くから売主側にも登記移転を求める利益があるぞちゃむ。" },
  { id: 114, field: "物権的請求権", tag: "共同相続・法定相続分超過と登記", q: "共同相続人の一人が法定相続分を超える持分を第三者に売った場合、他の相続人は登記なしで自己の法定相続分を第三者に対抗できるか？", a: "○", choices: ["○", "×"], fb_ok: "正解ちゃむ！自分の法定相続分については登記不要で対抗できるぞちゃむ（最判昭38.2.22）。ただし法定相続分を超える部分は登記が必要ちゃむ——範囲をしっかり区別してちゃむ。", fb_ng: "○ちゃむ。法定相続分の範囲内であれば登記なしで対抗できるちゃむ（最判昭38.2.22）。超過部分は177条の対抗問題になるから要注意ちゃむ。" },

const FIELDS = [...new Set(QUESTIONS.map(q => q.field))];

// ══ チャッピー弱点補強アルゴリズム ══
const REVIEW_STEPS = [1, 3, 7, 14];
const COOLDOWN_AFTER_WRONG = 3;

function todayStr() { return new Date().toISOString().slice(0, 10); }
function addDays(n) { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
function isDue(r) { return r && r.nextReview && todayStr() >= r.nextReview; }

function getClearCount(total) {
  if (total < 100) return 5;
  if (total < 300) return 7;
  return 10;
}

function isMastered(r) {
  const cc = getClearCount(QUESTIONS.length);
  if (!r || (r.correct_count||0) < cc) return false;
  if (!r.history || r.history.length < 3) return false;
  const recent = r.history.slice(-5);
  return recent.filter(Boolean).length >= 4;
}

function calcFieldAcc(results) {
  const acc = {};
  QUESTIONS.forEach(q => {
    const r = results[q.id];
    if (!acc[q.field]) acc[q.field] = {ok:0,total:0};
    if (r && r.history && r.history.length) {
      const h = r.history.slice(-10);
      acc[q.field].ok += h.filter(Boolean).length;
      acc[q.field].total += h.length;
    }
  });
  const out = {};
  Object.entries(acc).forEach(([f,v]) => { out[f] = v.total ? v.ok/v.total : null; });
  return out;
}

function pickQuestion(pool, results, seen) {
  const fieldAcc = calcFieldAcc(results);
  const avail = pool.filter(q => !seen.has(q.id) && !((results[q.id]||{}).cooldown > 0));
  const src = avail.length > 0 ? avail : pool.filter(q => !seen.has(q.id));
  if (!src.length) return pool[Math.floor(Math.random()*pool.length)];

  const due      = src.filter(q => isDue(results[q.id]));
  const weak     = src.filter(q => { const r=results[q.id]; return r&&r.history&&r.history.length>=1&&!isMastered(r)&&(r.priority||0.5)>=0.6; });
  const learning = src.filter(q => { const r=results[q.id]; return r&&r.history&&r.history.length>=1&&!isMastered(r)&&(r.priority||0.5)<0.6; });
  const unseen   = src.filter(q => !results[q.id]);
  const mastered = src.filter(q => isMastered(results[q.id]));

  const tiers = [{pool:due,w:120},{pool:weak,w:80},{pool:learning,w:40},{pool:unseen,w:20},{pool:mastered,w:5}].filter(t=>t.pool.length>0);
  if (!tiers.length) return src[Math.floor(Math.random()*src.length)];

  const tw = tiers.reduce((s,t)=>s+t.w,0);
  let rand = Math.random()*tw;
  let sel = tiers[tiers.length-1].pool;
  for (const t of tiers) { rand-=t.w; if(rand<=0){sel=t.pool;break;} }

  const weighted = sel.map(q => {
    const r = results[q.id];
    const pri = r ? (r.priority||0.5) : 0.5;
    const fa = fieldAcc[q.field]||0.5;
    return {q, w: pri*0.7+(1-fa)*0.3};
  });
  const wt = weighted.reduce((s,i)=>s+i.w,0);
  let wr = Math.random()*wt;
  for (const item of weighted) { wr-=item.w; if(wr<=0) return item.q; }
  return weighted[weighted.length-1].q;
}

function save(key,val) { try{localStorage.setItem('kv4-'+key,JSON.stringify(val));}catch(e){} }
function load(key,fb) { try{const v=localStorage.getItem('kv4-'+key);return v?JSON.parse(v):fb;}catch(e){return fb;} }

// ══ 状態 ══
let state = {
  tab: 'quiz',
  results: load('results',{}),
  current: null,
  selected: null,
  answered: false,
  fieldFilter: 'すべて',
  streak: load('streak',0),
  todayCount: load('todayCount',0),
  voiceMode: false,
  listening: false,
  sessionSeen: new Set(),
};

// lastDateチェック
if (load('lastDate','') !== todayStr()) { save('todayCount',0); state.todayCount=0; }

// ══ 音声 ══
const ttsOK = 'speechSynthesis' in window;
const sttOK = !!(window.SpeechRecognition || window.webkitSpeechRecognition);

function speak(text, cb) {
  if (!ttsOK) { if(cb) cb(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ja-JP'; u.rate=0.95; u.pitch=1.0;
  if (cb) u.onend=cb;
  window.speechSynthesis.speak(u);
}

function startRecognition() {
  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Rec) { alert('音声認識非対応ブラウザちゃむ'); return; }
  const rec = new Rec();
  rec.lang='ja-JP'; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult = e => {
    const v = e.results[0][0].transcript;
    state.listening = false;
    let ans = null;
    if(v.includes('まる')||v.includes('マル')||v.includes('丸')||v.includes('○')) ans='○';
    if(v.includes('ばつ')||v.includes('バツ')||v.includes('×')||v.includes('罰')) ans='×';
    if (!ans) { speak('もう一度どうぞ', ()=>startRecognition()); render(); return; }
    doAnswer(ans);
  };
  rec.onerror=()=>{ state.listening=false; render(); };
  rec.onend=()=>{ state.listening=false; render(); };
  rec.start();
  state.listening=true;
  render();
}

// ══ ロジック ══
function getPool() {
  return QUESTIONS.filter(q => state.fieldFilter==='すべて' || q.field===state.fieldFilter);
}

function nextQuestion() {
  const pool = getPool();
  if (!pool.length) { state.current=null; render(); return; }
  state.current = pickQuestion(pool, state.results, state.sessionSeen);
  state.selected = null;
  state.answered = false;
  render();
  if (state.voiceMode && state.current) {
    setTimeout(()=>speak(state.current.q, ()=>{ setTimeout(startRecognition,400); }),300);
  }
}

function doAnswer(choice) {
  if (state.answered || !state.current) return;
  const q = state.current;
  const correct = choice === q.a;
  state.selected = choice;
  state.answered = true;

  const prev = state.results[q.id] || {correct_count:0,wrong_count:0,lastCorrect:null,history:[],reviewStep:0,nextReview:null,cooldown:0,priority:0.5};
  const newHistory = [...(prev.history||[]),correct].slice(-10);
  const newStep = correct ? Math.min((prev.reviewStep||0)+1,REVIEW_STEPS.length-1) : 0;
  const missStep = Math.max(0,Math.min((prev.reviewStep||0)-1,REVIEW_STEPS.length-1));
  const nextReview = correct ? addDays(REVIEW_STEPS[newStep]) : addDays(REVIEW_STEPS[missStep]);
  const newPriority = correct ? Math.max(0.3,(prev.priority||0.5)-0.1) : Math.min(1.0,(prev.priority||0.5)+0.2);

  state.results[q.id] = {
    ...prev,
    correct_count: correct?(prev.correct_count||0)+1:(prev.correct_count||0),
    wrong_count: correct?(prev.wrong_count||0):(prev.wrong_count||0)+1,
    lastCorrect:correct, lastDate:todayStr(),
    history:newHistory, reviewStep:newStep, nextReview,
    priority:newPriority, cooldown:correct?0:COOLDOWN_AFTER_WRONG
  };

  // cooldownデクリメント
  Object.keys(state.results).forEach(k=>{
    if(parseInt(k)!==q.id) state.results[k].cooldown=Math.max(0,(state.results[k].cooldown||0)-1);
  });

  state.sessionSeen.add(q.id);
  save('results', state.results);

  state.todayCount++;
  save('todayCount', state.todayCount);
  save('lastDate', todayStr());

  state.streak = correct ? state.streak+1 : 0;
  save('streak', state.streak);

  if (state.voiceMode) {
    const fb = correct ? (q.fb_ok||'正解ちゃむ！') : (q.fb_ng||'不正解ちゃむ');
    speak(correct?'正解！'+fb.slice(0,50):'不正解。正解は'+q.a+'。'+fb.slice(0,40), ()=>setTimeout(nextQuestion,800));
  }

  render();
}

// ══ 統計 ══
function getStats() {
  const total = QUESTIONS.length;
  const mastered = QUESTIONS.filter(q=>isMastered(state.results[q.id])).length;
  const pct = Math.round(mastered/total*100);
  let label='準備段階';
  if(pct>=80) label='合格圏内🎯';
  else if(pct>=60) label='もう少し💪';
  else if(pct>=40) label='基礎固め中📚';
  const due = QUESTIONS.filter(q=>isDue(state.results[q.id])).length;
  const answered = Object.keys(state.results).length;
  const totalCorrect = Object.values(state.results).filter(r=>r.lastCorrect===true).length;
  const totalWrong = Object.values(state.results).filter(r=>r.lastCorrect===false).length;
  const allC = Object.values(state.results).reduce((s,r)=>s+(r.correct_count||0),0);
  const allW = Object.values(state.results).reduce((s,r)=>s+(r.wrong_count||0),0);
  const accuracy = allC+allW===0?0:Math.round(allC/(allC+allW)*100);
  return {total,mastered,pct,label,due,answered,totalCorrect,totalWrong,accuracy};
}

function getWeakTop5() {
  return QUESTIONS
    .filter(q=>(state.results[q.id]?.wrong_count||0)>0)
    .sort((a,b)=>(state.results[b.id]?.wrong_count||0)-(state.results[a.id]?.wrong_count||0))
    .slice(0,5);
}

function getWeakFields() {
  const fieldStats={};
  QUESTIONS.forEach(q=>{
    const r=state.results[q.id];
    if(!fieldStats[q.field]) fieldStats[q.field]={c:0,total:0};
    if(r){fieldStats[q.field].c+=(r.correct_count||0);fieldStats[q.field].total+=(r.correct_count||0)+(r.wrong_count||0);}
  });
  return Object.entries(fieldStats)
    .filter(([,v])=>v.total>0)
    .map(([f,v])=>({field:f,acc:Math.round(v.c/v.total*100)}))
    .sort((a,b)=>a.acc-b.acc);
}

// ══ レンダリング ══
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='className') el.className=v;
    else if(k==='onclick') el.onclick=v;
    else if(k==='onchange') el.onchange=v;
    else if(k==='disabled') { if(v) el.disabled=true; }
    else if(k==='style') Object.assign(el.style,v);
    else el.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c==null||c===false) return;
    el.appendChild(typeof c==='string'||typeof c==='number' ? document.createTextNode(c) : c);
  });
  return el;
}

      className:'voice-toggle '+(state.voiceMode?'voice-on':'voice-off'),

    state.voiceMode ? h('span',{className:'voice-status'}, state.listening?'👂 認識中…':'▶ 読み上げ待機中') : null,

  );
  frag.appendChild(voiceRow);

  // フィルター
  const filterRow = h('div',{className:'filter-row'},
    h('select',{className:'sel', onchange:e=>{ state.fieldFilter=e.target.value; state.sessionSeen=new Set(); nextQuestion(); }},
      ['すべて',...FIELDS].map(f=>{
        const opt=document.createElement('option');
        opt.value=f; opt.textContent=f;

        return opt;
      })
    ),
    pool.length+'問対象'
  );
  frag.appendChild(filterRow);

  if (!state.current) {
    frag.appendChild(h('div',{className:'card empty-card'},h('div',{style:{fontSize:'32px',marginBottom:'10px'}},'🎉'),h('div',{className:'no-data'},'このフィルターの問題は全部終わったちゃむ！'),h('button',{className:'next-btn',style:{marginTop:'16px'},onclick:()=>{state.fieldFilter='すべて';state.sessionSeen=new Set();nextQuestion();}},'全分野に戻る')));
    return frag;
  }

  const q = state.current;
  const r = state.results[q.id]||{};
  const acc = r.correct_count!==undefined&&r.wrong_count!==undefined&&(r.correct_count+r.wrong_count)>0
    ? Math.round(r.correct_count/(r.correct_count+r.wrong_count)*100) : null;

  // 問題カード
  const qCard = h('div',{className:'card'},
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'10px',alignItems:'center',flexWrap:'wrap',gap:'6px'}},
      h('span',{className:'field-tag'},q.field),
      h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
        isDue(r)?h('span',{className:'due-badge'},'🔔 復習日'):null,
        isMastered(r)?h('span',{className:'mastered-badge'},'✅ 習得済'):null,
        h('span',{style:{fontSize:'10px',color:'#555'}},'No.'+q.id)
      )
    ),
    h('div',{className:'q-text'},q.q),
    acc!==null?h('div',{style:{fontSize:'11px',color:'#aaa',marginTop:'10px'}},'正答率 '+acc+'%（'+r.correct_count+'/'+((r.correct_count||0)+(r.wrong_count||0))+'問）'):null
  );
  frag.appendChild(qCard);

  // 音声マイクボタン
  if (state.voiceMode && !state.answered) {
    frag.appendChild(h('div',{style:{marginBottom:'12px',textAlign:'center'}},
      h('button',{
        className:'mic-btn '+(state.listening?'mic-inactive':'mic-active'),
        disabled:state.listening,
        onclick:startRecognition
      }, state.listening?'👂 聞いてるちゃむ…':'🎙️ 答える（まる／ばつ）'),
      h('div',{style:{fontSize:'10px',color:'#aaa',marginTop:'4px'}},'または下のボタンをタップちゃむ')
    ));
  }

  // 選択肢
  const choicesDiv = h('div',{style:{marginBottom:'12px'}});
  q.choices.forEach(c=>{
    let cls='choice-btn';
    if(state.answered){
      if(c===q.a) cls+=' choice-correct';
      else if(c===state.selected) cls+=' choice-wrong';
      else cls+=' choice-dim';
    }
    const btn=h('button',{className:cls,disabled:state.answered,onclick:()=>doAnswer(c)},
      (state.answered&&c===q.a?'✓ ':''),(state.answered&&c===state.selected&&c!==q.a?'✗ ':''),c
    );
    choicesDiv.appendChild(btn);

  // フィードバック
  if (state.answered) {
    const ok = state.selected===q.a;

      h('div',{className:'fb-text'},ok?q.fb_ok:q.fb_ng),

    if (!state.voiceMode) {
      frag.appendChild(h('button',{className:'next-btn',onclick:nextQuestion},'次の問題へ →'));
    } else {
      frag.appendChild(h('button',{className:'next-btn',onclick:nextQuestion},'▶ 次へ（手動）'));
    }
  }

  return frag;
}

    {label:'正解数',val:s.totalCorrect,color:'#2e7d32',bg:'#e8f5e9'},

    grid.appendChild(h('div',{className:'stats-box',style:{background:item.bg}},
      h('div',{className:'stats-num',style:{color:item.color}},item.val),
      h('div',{className:'stats-label',style:{color:item.color}},item.label)
    ));
  });
  frag.appendChild(grid);

  // 分野別
  const fieldCard = h('div',{className:'card'});
  fieldCard.appendChild(h('div',{className:'section-title'},'分野別正解率（弱い順）'));

    fieldCard.appendChild(h('div',{style:{fontSize:'12px',color:'#aaa',textAlign:'center',padding:'12px'}},'まだデータなしちゃむ🌸'));
  } else {
    weakFields.forEach(f=>{
      const color = f.acc>=80?'#2e7d32':f.acc>=50?'#e65100':'#c62828';
      const barColor = f.acc>=80?'#4caf50':f.acc>=50?'#ff9800':'#f44336';
      const row = h('div',{className:'field-acc-row'},
        h('div',{className:'field-acc-header'},
          h('span',{style:{color:'#555'}},f.field),

    state.sessionSeen=new Set();
    nextQuestion(); setTab('quiz');
  }},'記録をリセット'));

  return frag;
}

function renderWeakTab() {
  const frag = document.createDocumentFragment();
  const weak5 = getWeakTop5();
  const weakFields = getWeakFields();
  const colors=['#ef5350','#ff9800','#ffd600','#42a5f5','#ab47bc'];

  frag.appendChild(h('div',{className:'section-title'},'❌ 誤答数トップ5'));
  if (!weak5.length) {
    frag.appendChild(h('div',{className:'card empty-card'},h('div',{className:'no-data'},'まだ間違えた問題がないちゃむ🌸')));
  } else {
    weak5.forEach((q,i)=>{
      const r=state.results[q.id]||{};
      const card=h('div',{className:'card weak-card',style:{borderLeftColor:colors[i]}},
        h('div',{style:{display:'flex',gap:'6px',marginBottom:'6px',alignItems:'center',flexWrap:'wrap'}},
          h('span',{style:{fontSize:'14px',fontWeight:'bold',color:colors[i]}},'#'+(i+1)),
          h('span',{className:'badge'},q.field),
          h('span',{style:{fontSize:'10px',color:'#c62828',fontWeight:'bold'}},'誤答'+(r.wrong_count||0)+'回'),
          h('span',{style:{fontSize:'10px',color:'#aaa',marginLeft:'auto'}},'priority '+((r.priority||0.5).toFixed(2)))
        ),
        h('div',{style:{fontSize:'12px',color:'#333',lineHeight:'1.6',marginBottom:'4px'}},q.q.slice(0,60)+'…'),
        h('div',{style:{fontSize:'11px',color:'#2e7d32'}},'正解：'+q.a)
      );
      frag.appendChild(card);
    });
  }

  // 弱点分野
  const wfCard=h('div',{className:'card',style:{marginTop:'14px'}});
  wfCard.appendChild(h('div',{className:'section-title',style:{color:'#c62828'}},'📉 弱点分野ランキング'));
  if(!weakFields.length){
    wfCard.appendChild(h('div',{style:{fontSize:'12px',color:'#aaa',textAlign:'center',padding:'12px'}},'まだデータなしちゃむ🌸'));
  } else {
    weakFields.forEach((f,i)=>{
      const color=f.acc>=80?'#2e7d32':f.acc>=50?'#e65100':'#c62828';
      wfCard.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #f0f0f0'}},
        h('span',{style:{fontSize:'12px',color:'#555'}},'#'+(i+1)+' '+f.field),
        h('span',{style:{fontSize:'12px',fontWeight:'bold',color}},f.acc+'%')
      ));
    });
  }
  frag.appendChild(wfCard);

  // 全間違えログ
  const wqList=QUESTIONS.filter(q=>(state.results[q.id]?.wrong_count||0)>0).sort((a,b)=>(state.results[b.id]?.wrong_count||0)-(state.results[a.id]?.wrong_count||0));
  const logCard=h('div',{className:'card',style:{marginTop:'14px'}});
  logCard.appendChild(h('div',{className:'section-title'},'間違えた問題ログ（'+wqList.length+'問）'));
  if(!wqList.length){
    logCard.appendChild(h('div',{style:{textAlign:'center',color:'#aaa',fontSize:'12px',padding:'16px'}},'まだないちゃむ🌸'));
  } else {
    wqList.forEach(q=>{
      const r=state.results[q.id]||{};
      logCard.appendChild(h('div',{className:'wrong-log-item'},
        h('div',{style:{display:'flex',gap:'6px',marginBottom:'2px'}},
          h('span',{style:{fontSize:'11px',color:'#ef9a9a'}},q.field+' No.'+q.id),
          h('span',{style:{fontSize:'11px',color:'#c62828',marginLeft:'auto'}},'✕'+(r.wrong_count||0)+'回')
        ),
        h('div',{style:{fontSize:'12px',color:'#555'}},q.q.slice(0,55)+'…'),
        h('div',{style:{fontSize:'11px',color:'#2e7d32'}},'→ 正解：'+q.a)
      ));
    });
  }
  frag.appendChild(logCard);
  return frag;
}

function renderReviewTab() {
  const frag = document.createDocumentFragment();
  const dueList = QUESTIONS.filter(q=>isDue(state.results[q.id]));
  frag.appendChild(h('div',{className:'section-title'},'🔔 今日の復習（'+dueList.length+'問）'));
  if (!dueList.length) {
    frag.appendChild(h('div',{className:'card empty-card'},
      h('div',{style:{fontSize:'24px',marginBottom:'10px'}},'✨'),
      h('div',{style:{color:'#666',fontSize:'13px'}},'今日の復習は全部終わってるちゃむ🌸')
    ));
  } else {
    dueList.forEach(q=>{
      const r=state.results[q.id]||{};
      frag.appendChild(h('div',{className:'card review-item'},
        h('div',{style:{display:'flex',gap:'6px',marginBottom:'6px'}},
          h('span',{className:'due-badge'},'🔔 復習日'),
          h('span',{style:{fontSize:'10px',color:'#555'}},q.field+' No.'+q.id)
        ),
        h('div',{style:{fontSize:'12px',color:'#333',lineHeight:'1.6',marginBottom:'6px'}},q.q),
        h('div',{style:{fontSize:'11px',color:'#2e7d32'}},'正解：'+q.a),
        h('div',{style:{fontSize:'10px',color:'#aaa',marginTop:'4px'}},'次の復習: '+r.nextReview)
      ));
    });
  }
  return frag;
}

function setTab(t) { state.tab=t; render(); }

function render() {
  const app = document.getElementById('app');
  app.innerHTML='';

  const s = getStats();

  // ヘッダー
  const header=h('div',{className:'header'},
    h('div',{className:'header-row'},
      h('div',{className:'logo'},'梅'),
      h('div',null,
        h('div',{className:'header-title'},'きみまろ道場 v4【精査済み107問】'),
        h('div',{className:'header-sub'},QUESTIONS.length+'問 ／ 判例検証済み・チャッピー弱点AI搭載')
      ),
      h('div',{className:'header-stats'},
        s.due>0?h('div',{className:'stat-item'},h('div',{className:'stat-num',style:{color:'#e05c00'}},'🔔'+s.due),h('div',{className:'stat-label'},'復習')):null,
        h('div',{className:'stat-item'},h('div',{className:'stat-num',style:{color:'#888'}},'🔥'+state.streak),h('div',{className:'stat-label'},'連続')),
        h('div',{className:'stat-item'},h('div',{className:'stat-num',style:{color:'#888'}},state.todayCount),h('div',{className:'stat-label'},'今日'))
      )
    )
  );
  app.appendChild(header);

  // タブ
  const tabs=h('div',{className:'tabs'});
  [['quiz','📝 問題'],['stats','📊 成績'],['weak','🔴 弱点'],['review','🔔 復習']].forEach(([id,label])=>{
    tabs.appendChild(h('button',{className:'tab-btn'+(state.tab===id?' active':''),onclick:()=>setTab(id)},label));
  });
  app.appendChild(tabs);

  // コンテンツ
  const content=h('div',{className:'content'});
  if(state.tab==='quiz') content.appendChild(renderQuizTab());
  else if(state.tab==='stats') content.appendChild(renderStatsTab());
  else if(state.tab==='weak') content.appendChild(renderWeakTab());
  else if(state.tab==='review') content.appendChild(renderReviewTab());
  app.appendChild(content);
}

// ── 初期化 ──
nextQuestion();
</script>
